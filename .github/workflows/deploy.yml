name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy web files and reports
        run: |
          mkdir -p _site/reports _site/config
          cp web/index.html _site/index.html
          [ -f web/risk-trend.svg ] && cp web/risk-trend.svg _site/risk-trend.svg || true
          for f in news-feed.json sentiment.json institutional.json channel-stats.json premarket.json; do
            [ -f "web/$f" ] && cp "web/$f" "_site/$f" || true
          done
          cp -r reports/. _site/reports/
          cp -r config/. _site/config/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
