name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy web files and reports
        run: |
          mkdir -p _site/reports _site/config _site/grid-bot
          # HTML 頁面
          cp web/index.html _site/index.html
          [ -f web/signals.html ] && cp web/signals.html _site/signals.html || true
          [ -f web/demo-finviz.html ] && cp web/demo-finviz.html _site/demo-finviz.html || true
          [ -f web/demo-linear.html ] && cp web/demo-linear.html _site/demo-linear.html || true
          [ -f web/demo-bloomberg.html ] && cp web/demo-bloomberg.html _site/demo-bloomberg.html || true
          [ -f web/demo-tradingview.html ] && cp web/demo-tradingview.html _site/demo-tradingview.html || true
          [ -f web/terminal.html ] && cp web/terminal.html _site/terminal.html || true
          # 共用 CSS/JS
          [ -f web/shared.css ] && cp web/shared.css _site/shared.css || true
          [ -f web/shared.js ] && cp web/shared.js _site/shared.js || true
          # SVG/圖片
          [ -f web/risk-trend.svg ] && cp web/risk-trend.svg _site/risk-trend.svg || true
          # JSON 數據（全部複製）
          for f in web/*.json; do
            [ -f "$f" ] && cp "$f" "_site/$(basename $f)" || true
          done
          # 子目錄
          cp -r reports/. _site/reports/
          cp -r config/. _site/config/
          [ -d web/grid-bot ] && cp -r web/grid-bot/. _site/grid-bot/ || true

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
