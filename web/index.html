<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Intel — 每日美股台股市場情報</title>
  <meta name="description" content="每日美股盤後分析 + 台股操盤框架。三大指數、風險燈號、AI 操作建議、技術分析。免費 Telegram 推送。">
  <meta name="keywords" content="美股,台股,盤後分析,市場情報,技術分析,AI操作建議,Telegram,投資">
  <meta property="og:title" content="Market Intel — 每日美股台股市場情報">
  <meta property="og:description" content="三大指數 + 風險燈號 + AI 操作建議，每日 05:30 免費推送到 Telegram">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://rostov12.github.io/market-intel">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Market Intel — 每日美股台股市場情報">
  <meta name="twitter:description" content="三大指數 + 風險燈號 + AI 操作建議，免費 Telegram 推送">
  <link rel="canonical" href="https://rostov12.github.io/market-intel">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.2/dist/apexcharts.min.js"></script>
  <style>
    :root {
      --bg-dark:    #0B0F19;
      --card-bg:    #1A2235;
      --card-bg2:   #1E2840;
      --border:     #2A354D;
      --border-ai:  #6366F1;
      --text-main:  #FFFFFF;
      --text-muted: #94A3B8;
      --color-up:   #10B981;
      --color-down: #EF4444;
      --color-ai:   #6366F1;
      --color-warn: #F59E0B;
      --color-blue: #38BDF8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: rgba(26, 34, 53, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366F1, #38BDF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .market-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .market-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-up);
      box-shadow: 0 0 6px var(--color-up);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-meta { color: var(--text-muted); font-size: 12px; }

    /* ── Layout ── */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-gauge { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: stretch; }
    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-gauge { grid-template-columns: 1fr; }
    }
    .section-gap { margin-top: 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Base Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--color-ai);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.12);
    }
    .card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── A区：情緒儀表板 ── */
    .gauge-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color 0.2s;
    }
    .gauge-card:hover { border-color: var(--color-ai); }
    .gauge-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0;
      align-self: flex-start;
    }
    #sentiment-gauge { width: 100%; }
    .gauge-legend {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 8px;
      margin-top: 4px;
    }

    /* ── AI Hero Card ── */
    .ai-hero {
      background: linear-gradient(135deg, #1A2235, #141929);
      border: 1px solid var(--border-ai);
      border-radius: 14px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .ai-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .ai-hero-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-ai);
      margin-bottom: 12px;
    }
    .ai-hero-label .ai-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-ai);
      box-shadow: 0 0 8px var(--color-ai);
    }
    .ai-summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* ── 指數卡片 ── */
    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 8px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .index-card:hover { transform: translateY(-2px); border-color: var(--color-ai); }
    .index-card .name { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    .index-card .price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .index-card .change {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }
    .index-card .index-spark { margin-top: 6px; height: 40px; }
    .up   { color: var(--color-up); }
    .down { color: var(--color-down); }
    .flat { color: var(--text-muted); }

    /* ── 風險面板 ── */
    .risk-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 20px;
    }
    .risk-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .risk-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-green  { background: rgba(16,185,129,0.12); color: var(--color-up);   border: 1px solid rgba(16,185,129,0.4);  box-shadow: 0 0 12px rgba(16,185,129,0.15); }
    .risk-yellow { background: rgba(245,158,11,0.12); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.4);  box-shadow: 0 0 12px rgba(245,158,11,0.15); }
    .risk-red    { background: rgba(239,68,68,0.12);  color: var(--color-down); border: 1px solid rgba(239,68,68,0.4);   box-shadow: 0 0 12px rgba(239,68,68,0.15); }
    .risk-top .date { margin-left: auto; color: var(--text-muted); font-size: 12px; }
    /* 信號分布列 */
    .risk-bottom {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 640px) { .risk-bottom { grid-template-columns: 1fr; } }
    .risk-signals {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sig-count {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--card-bg2);
    }
    .sig-count.green  { color: var(--color-up); }
    .sig-count.yellow { color: var(--color-warn); }
    .sig-count.red    { color: var(--color-down); }
    /* 評分說明 */
    .risk-explain {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }
    .risk-explain strong { color: var(--text-main); font-weight: 600; }
    .risk-thresholds {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .risk-thr {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-thr.green  { background: rgba(16,185,129,0.1); color: var(--color-up); }
    .risk-thr.yellow { background: rgba(245,158,11,0.1); color: var(--color-warn); }
    .risk-thr.red    { background: rgba(239,68,68,0.1);  color: var(--color-down); }

    /* ── 風險因子明細 ── */
    .risk-factors-section {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .risk-factors-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .risk-factors-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .risk-factors-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
    }
    .risk-factors-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(42,53,77,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .risk-factors-table tr.row-green td { color: var(--color-up); }
    .risk-factors-table tr.row-yellow td { color: var(--color-warn); }
    .risk-factors-table tr.row-red td { color: var(--color-down); }
    .risk-factors-table tr.row-green { background: rgba(16,185,129,0.03); }
    .risk-factors-table tr.row-yellow { background: rgba(245,158,11,0.05); }
    .risk-factors-table tr.row-red { background: rgba(239,68,68,0.06); }

    /* ── 宏觀指標列 ── */
    .macro-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      align-items: center;
    }
    .macro-strip .macro-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .macro-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .macro-item .m-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .macro-item .m-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .macro-item .m-chg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .macro-item .m-desc {
      font-size: 10px;
      color: var(--text-muted);
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }
    /* 量能徽章 */
    .vol-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 3px;
    }
    .vol-spike  { background: rgba(245,158,11,0.15); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.35); }
    .vol-normal { background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── 技術指標列 ── */
    .wi-tech {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px;
    }
    .tech-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600;
      padding: 1px 5px; border-radius: 3px;
      white-space: nowrap;
    }
    .tech-bull   { background: rgba(16,185,129,0.12); color: #10B981; border: 1px solid rgba(16,185,129,0.3); }
    .tech-bear   { background: rgba(239,68,68,0.12);  color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
    .tech-neutral{ background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid var(--border); }
    .tech-warn   { background: rgba(245,158,11,0.12); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.3); }

    /* ── Sentiment Strip (SPY PCR + WSB) ── */
    .sentiment-strip {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
    }
    .sent-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sent-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .sent-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .sent-signal { font-size: 11px; }
    .sent-bull { color: var(--color-up); }
    .sent-bear { color: var(--color-down); }
    .sent-neutral { color: var(--color-warn); }
    .sent-divider { width: 1px; height: 40px; background: var(--border); }

    /* ── Institutional Card (三大法人) ── */
    .inst-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid #6366F1;
      border-radius: 12px;
      padding: 16px 20px;
    }
    .inst-card h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 12px; }
    .inst-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(42,53,77,0.6);
      font-size: 13px;
    }
    .inst-row:last-child { border-bottom: none; }
    .inst-name { color: var(--text-muted); font-size: 12px; }
    .inst-val-pos { color: var(--color-up); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .inst-val-neg { color: var(--color-down); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .inst-bar-wrap { flex: 1; margin: 0 12px; height: 6px; background: rgba(42,53,77,0.8); border-radius: 3px; overflow: hidden; max-width: 160px; }
    .inst-bar-pos { height: 100%; background: var(--color-up); border-radius: 3px; }
    .inst-bar-neg { height: 100%; background: var(--color-down); border-radius: 3px; float: right; }
    .inst-interpret { font-size: 11px; color: var(--text-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }

    /* ── Premarket Panel ── */
    .premarket-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--color-blue);
      border-radius: 12px;
      padding: 16px;
    }
    .premarket-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .pm-tone-badge {
      font-size: 11px; font-weight: 700; padding: 2px 9px;
      border-radius: 10px; border: 1px solid;
    }
    .pm-tone-bull { color: var(--color-up); border-color: var(--color-up); background: rgba(16,185,129,0.1); }
    .pm-tone-bear { color: var(--color-down); border-color: var(--color-down); background: rgba(239,68,68,0.1); }
    .pm-tone-neutral { color: var(--color-warn); border-color: var(--color-warn); background: rgba(245,158,11,0.1); }
    .pm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .pm-mover {
      background: var(--card-bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
    }
    .pm-mover-sym { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .pm-mover-name { font-size: 11px; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pm-mover-pct { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .pm-mover-pct.up   { color: var(--color-up); }
    .pm-mover-pct.down { color: var(--color-down); }
    .pm-mover-pct.flat { color: var(--text-muted); }

    /* buy / watch / sell badges */
    .action-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      cursor: default;
    }
    .sig-buy   { background: rgba(16,185,129,0.18); color: #10B981; border: 1px solid rgba(16,185,129,0.4); }
    .sig-watch { background: rgba(56,189,248,0.12); color: #38BDF8; border: 1px solid rgba(56,189,248,0.35); }
    .sig-sell  { background: rgba(239,68,68,0.15);  color: #EF4444; border: 1px solid rgba(239,68,68,0.4); }

    /* ── AI 市場標題 ── */
    .ai-market-title {
      font-size: 13px;
      color: var(--color-ai);
      font-style: italic;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 2px solid var(--color-ai);
      line-height: 1.5;
    }

    /* ── 標的短評 ── */
    .wi-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* ── 今日總結 ── */
    .summary-card {
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .summary-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) { .summary-stats { grid-template-columns: repeat(2, 1fr); } }
    .stat-block {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-block .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-block .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
    }
    .stat-block .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .summary-advice {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.7;

function renderDateNavUI() {
  const nav = document.getElementById('date-nav');
  if (!nav || !allDates.length) return;
  const isLatest = currentIdx === allDates.length - 1;
  const isFirst  = currentIdx === 0;
  const date = allDates[currentIdx];
  nav.innerHTML = `
    <div class="date-nav">
      <button class="date-btn" onclick="loadDate(${currentIdx - 1})" ${isFirst ? 'disabled' : ''}>‹ 前一日</button>
      <span class="date-current">${date}${isLatest ? '<span class="date-badge">最新</span>' : ''}</span>
      <button class="date-btn" onclick="loadDate(${currentIdx + 1})" ${isLatest ? 'disabled' : ''}>後一日 ›</button>
    </div>
  `;
}

async function loadDate(idx) {
  if (idx < 0 || idx >= allDates.length) return;
  currentIdx = idx;
  renderDateNavUI();
  document.getElementById('app').innerHTML = '<div class="loading">⏳ 載入中...</div>';
  try {
    const data = await fetchJSON(`reports/${allDates[idx]}.json`);
    render(data, cachedHistory);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 載入失敗：${e.message}</div>`;
  }
}

/* ── D区：30天趨勢折線圖 ── */
function initTrendChart(history) {
  const el = document.querySelector('#trend-chart');
  if (!el || typeof ApexCharts === 'undefined') return;

  const SYMBOLS = [
    { key: 'SMH', name: '半導體 SMH', color: '#6366F1' },
    { key: 'GLD', name: '黃金 GLD',   color: '#F59E0B' },
    { key: 'BTC', name: 'Bitcoin',    color: '#F97316' },
  ];

  const series = [];
  let categories = [];

  SYMBOLS.forEach(s => {
    const hist = (history[s.key] || []).slice(-30);
    if (hist.length < 3) return;
    if (!categories.length) categories = hist.map(h => h.date);
    const first = hist[0].price || 1;
    series.push({
      name:  s.name,
      color: s.color,
      data:  hist.map(h => +((h.price - first) / first * 100).toFixed(2)),
    });
  });

  if (!series.length) {
    el.innerHTML = '<div class="trend-placeholder">📊 歷史數據累積中，5個交易日後啟用</div>';
    return;
  }

  new ApexCharts(el, {
    series,
    chart: {
      type: 'line', height: 220, background: 'transparent',
      toolbar: { show: false }, zoom: { enabled: false },
      animations: { enabled: false },
    },
    stroke: { curve: 'straight', width: 1.8 },
    xaxis: {
      categories,
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'Inter' },
        formatter: v => v ? v.slice(5) : '',
      },
      tickAmount: 6, axisBorder: { show: false }, axisTicks: { show: false },
    },
    yaxis: {
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'JetBrains Mono' },
        formatter: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%',
      },
    },
    grid: { borderColor: '#2A354D', strokeDashArray: 3 },
    legend: { labels: { colors: '#94A3B8' }, fontSize: '12px', fontFamily: 'Inter' },
    tooltip: {
      theme: 'dark',
      y: { formatter: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%' },
      x: { show: true },
    },
    theme: { mode: 'dark' },
  }).render();
}

async function fetchJSON(path) {
  const res = await fetch(`${RAW_BASE}/${path}?_=${Date.now()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function pctClass(pct) {
  if (pct === null || pct === undefined) return 'flat';
  return pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
}

function fmtPct(pct) {
  if (pct === null || pct === undefined) return 'N/A';
  const sign = pct >= 0 ? '+' : '';
  return `${sign}${pct.toFixed(2)}%`;
}

function fmtPrice(price) {
  if (price === null || price === undefined) return 'N/A';
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function signalDot(sig) {
  if (sig === '🟢') return '<span class="signal green"></span>';
  if (sig === '🟡') return '<span class="signal yellow"></span>';
  if (sig === '🔴') return '<span class="signal red"></span>';
  return '<span class="signal gray"></span>';
}

function riskBadge(riskLine) {
  if (!riskLine) return '<span class="risk-badge risk-green">🟢 綠燈 — 正常</span>';
  const cls = riskLine.includes('紅') ? 'risk-red'
            : riskLine.includes('黃') ? 'risk-yellow'
            : 'risk-green';
  const icon = riskLine.includes('紅') ? '🔴' : riskLine.includes('黃') ? '🟡' : '🟢';
  return `<span class="risk-badge ${cls}">${icon} ${riskLine}</span>`;
}

function updateMarketStatus() {
  const now = new Date();
  const hour = now.getUTCHours();
  const min  = now.getUTCMinutes();
  const weekday = now.getUTCDay();
  const statusEl = document.getElementById('market-status-text');
  const dotEl    = document.querySelector('.market-status .dot');
  if (!statusEl || !dotEl) return;
  const isWeekday = weekday >= 1 && weekday <= 5;
  const totalMin  = hour * 60 + min;
  const isOpen    = isWeekday && totalMin >= 810 && totalMin < 1200; // 13:30–20:00 UTC
  if (isOpen) {
    statusEl.textContent = '🟢 Market Open';
    dotEl.style.background = '#10B981';
    dotEl.style.boxShadow  = '0 0 6px #10B981';
    dotEl.style.animation  = '';
  } else {
    statusEl.textContent = '⚫ Market Closed';
    dotEl.style.background = '#94A3B8';
    dotEl.style.boxShadow  = 'none';
    dotEl.style.animation  = 'none';
  }
}

/* ── 可重現的偽亂數（seed = symbol + date）── */
function seededRNG(seed) {
  let s = seed.split('').reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  return () => {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    return ((s ^ (s >>> 16)) >>> 0) / 0xffffffff;
  };
}

/* ── 生成 9 個偽歷史數據點（末尾 = change_pct）── */
function generateSparkData(changePct, symbol, date) {
  const rng = seededRNG((symbol || '') + (date || ''));
  const end = changePct || 0;
  const pts = [];
  let cur = end * 0.3;
  for (let i = 0; i < 8; i++) {
    cur += (rng() - 0.48) * Math.abs(end || 0.5) * 0.6;
    pts.push(+cur.toFixed(3));
  }
  pts.push(+end.toFixed(3));
  return pts;
}

/* ── A区：情緒分數（優先用 CNN 真實數據）── */
function calcSentimentScore(data) {
  // 有 CNN 真實數據就直接用
  const fg = data.fear_greed;
  if (fg && fg.score !== null && fg.score !== undefined) {
    return Math.round(fg.score);
  }
  // fallback：由信號比例 + 風險燈號推算
  const signals = (data.watchlist || []).map(w => w.signal);
  const total   = signals.length || 1;
  const greens  = signals.filter(s => s === '🟢').length;
  const yellows = signals.filter(s => s === '🟡').length;
  let score = Math.round(((greens + yellows * 0.5) / total) * 100);
  if (data.risk_line) {
    if (data.risk_line.includes('紅')) score = Math.min(score, 28);
    else if (data.risk_line.includes('黃')) score = Math.min(score, 52);
  }
  const idxArr = data.indices || [];
  if (idxArr.length) {
    const avg = idxArr.reduce((s, i) => s + (i.change_pct || 0), 0) / idxArr.length;
    score = Math.min(100, Math.max(0, score + Math.round(avg * 3)));
  }
  return Math.max(0, Math.min(100, score));
}

function renderSignalBadge(sigArr, symbol) {
  if (!sigArr || !sigArr.length) return '';
  const sym = symbol.replace('-USD','').toUpperCase();
  const s = sigArr.find(s => s.symbol === sym);
  if (!s) return '';
  const cfg = {
    buy:   { cls: 'sig-buy',   label: 'BUY' },
    watch: { cls: 'sig-watch', label: 'WATCH' },
    sell:  { cls: 'sig-sell',  label: 'SELL' },
  };
  const c = cfg[s.signal_type];
  if (!c) return '';
  const title = s.note ? ` title="${s.note}"` : '';
  return `<span class="action-badge ${c.cls}"${title}>${c.label}</span>`;
}

function renderWatchlist(items, date, signals, itemNotes) {
  return items.map(w => {
    const symbol = w.symbol.replace('-USD', '');
    const desc   = w.name.includes('（') ? w.name.split('（')[1].replace('）','') : w.name;
    const safeId = 'spark-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
    const vr = w.volume_ratio;
    const volBadge = vr
      ? `<span class="vol-badge ${vr >= 1.5 ? 'vol-spike' : 'vol-normal'}">${vr.toFixed(1)}x</span>`
      : '';
    const actionBadge = renderSignalBadge(signals, w.symbol);
    const note = (itemNotes || {})[symbol] || '';

    // 技術指標 badges
    function techClass(val, bullish, bearish) {
      if (!val) return 'tech-neutral';
      if (val === bullish) return 'tech-bull';
      if (val === bearish) return 'tech-bear';
      return 'tech-neutral';
    }
    const trendBadge = w.trend
      ? `<span class="tech-badge ${techClass(w.trend,'多頭','空頭')}">${w.trend}</span>` : '';
    const macdBadge  = w.macd_signal
      ? `<span class="tech-badge ${w.macd_signal.includes('金叉') ? 'tech-bull' : w.macd_signal.includes('死叉') ? 'tech-bear' : w.macd_signal==='多頭' ? 'tech-bull' : 'tech-bear'}">MACD ${w.macd_signal}</span>` : '';
    const rsiBadge   = w.rsi_12 != null
      ? `<span class="tech-badge ${w.rsi_status && w.rsi_status.includes('超賣') ? 'tech-bull' : w.rsi_status && w.rsi_status.includes('超買') ? 'tech-warn' : 'tech-neutral'}">RSI ${w.rsi_12}</span>` : '';
    const biasBadge  = w.bias_ma5 != null
      ? `<span class="tech-badge tech-neutral">乖離${w.bias_ma5>0?'+':''}${w.bias_ma5.toFixed(1)}%</span>` : '';
    const techRow = (trendBadge || macdBadge || rsiBadge || biasBadge)
      ? `<div class="wi-tech">${trendBadge}${macdBadge}${rsiBadge}${biasBadge}</div>` : '';

    return `
      <div class="watchlist-item">
        <div class="wi-left">
          ${signalDot(w.signal)}
          <div style="min-width:0">
            <div class="symbol">${symbol}${volBadge}${actionBadge}</div>
            <div class="desc">${desc}<span class="tag">${w.category}</span></div>
            ${note ? `<div class="wi-note" title="${note}">${note}</div>` : ''}
            ${techRow}
          </div>
        </div>
        <div class="wi-spark" id="${safeId}"></div>
        <div class="wi-right">
          <div class="price-val">${fmtPrice(w.price)}</div>
          <div class="pct ${pctClass(w.change_pct)}">${fmtPct(w.change_pct)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderSectorHeatmap(watchlist, signals, itemNotes) {
  const sectors = [
    { name: '科技與AI',  icon: '💻', keys: ['SMH', 'AIQ', 'BOTZ'] },
    { name: '能源與核能', icon: '⚡', keys: ['URNM', 'NLR', 'CPER'] },
    { name: '避險資產',  icon: '🛡️', keys: ['GLD', 'BTC', 'ETH'] },
    { name: '板塊輪動',  icon: '🔄', keys: ['XLK', 'XLE', 'XLF', 'XLV', 'XBI'] },
  ];
  const lookup = {};
  watchlist.forEach(w => { lookup[w.symbol.replace('-USD','')] = w; });

  const sigLookup = {};
  (signals || []).forEach(s => { sigLookup[s.symbol.replace('-USD','')] = s; });

  return sectors.map(sector => {
    const items = sector.keys.map(k => lookup[k]).filter(Boolean);
    return `
      <div class="heatmap-sector">
        <div class="heatmap-sector-title">${sector.icon} ${sector.name}</div>
        <div class="heatmap-blocks">
          ${items.map(w => {
            const pct  = w.change_pct || 0;
            const abs  = Math.min(Math.abs(pct) / 4, 1);
            const bg   = pct >= 0
              ? `rgba(16,185,129,${(0.08 + abs * 0.45).toFixed(2)})`
              : `rgba(239,68,68,${(0.08 + abs * 0.45).toFixed(2)})`;
            const border = pct >= 0
              ? `rgba(16,185,129,${(0.25 + abs * 0.5).toFixed(2)})`
              : `rgba(239,68,68,${(0.25 + abs * 0.5).toFixed(2)})`;
            const sym = w.symbol.replace('-USD','');
            const sig = sigLookup[sym] || {};
            const note = sig.note || (itemNotes || {})[sym] || '';
            // desc：括號內的中文說明（e.g. 鈾礦 ETF核能）
            const descMatch = (w.name || '').match(/（([^）]+)）/);
            const desc = descMatch ? descMatch[1] : (w.category || sector.name);
            return `
              <div class="heatmap-block"
                style="background:${bg};border-color:${border}"
                data-sym="${sym}"
                data-name="${w.name || sym}"
                data-desc="${desc.replace(/"/g,'&quot;')}"
                data-price="${w.price || ''}"
                data-pct="${pct}"
                data-vol="${w.volume_ratio || ''}"
                data-signal="${sig.signal_type || ''}"
                data-note="${note.replace(/"/g,'&quot;')}"
                data-cat="${w.category || sector.name}"
                data-w52pos="${w.w52_pos !== null && w.w52_pos !== undefined ? w.w52_pos : ''}"
                data-w52high="${w.w52_high || ''}"
                data-w52low="${w.w52_low || ''}"
                onmouseenter="showHbTooltip(event,this)"
                onmousemove="moveHbTooltip(event)"
                onmouseleave="hideHbTooltip()">
                <div class="hb-symbol">${sym}</div>
                <div class="hb-pct ${pctClass(pct)}">${fmtPct(pct)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

const SYM_KEYWORDS = {
  URNM: ['核能','uranium','鈾','URNM','nuclear','核電'],
  NLR:  ['核能','nuclear','NLR','核電'],
  CPER: ['銅','copper','CPER'],
  SMH:  ['半導體','semiconductor','晶片','chip','SMH','NVIDIA','AMD','英偉達'],
  AIQ:  ['AI','人工智慧','artificial intelligence','AIQ'],
  BOTZ: ['機器人','robotics','automation','BOTZ'],
  GLD:  ['黃金','gold','GLD','避險'],
  BTC:  ['Bitcoin','比特幣','BTC','加密','crypto'],
  ETH:  ['Ethereum','以太','ETH'],
  QQQ:  ['那斯達克','NASDAQ','科技股','QQQ'],
  SPY:  ['標普','S&P','SPY'],
  TLT:  ['國債','treasury','殖利率','TLT'],
};

function findRelatedNews(sym, cat) {
  const newsData = window._newsData;
  if (!newsData || !newsData.news) return [];
  const keywords = [
    ...(SYM_KEYWORDS[sym] || []),
    sym,
    ...(cat || '').split(/[\/，\s]+/).filter(k => k.length > 1),
  ];
  return newsData.news.filter(n => {
    const text = (n.title || '').toLowerCase();
    return keywords.some(k => text.includes(k.toLowerCase()));
  }).slice(0, 2);
}

function genAdviceText(sym, pct, volNum, sig, note, cat) {
  const absPct    = Math.abs(pct);
  const dir       = pct >= 0 ? '上漲' : '下跌';
  const pctStr    = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  const magnitude = absPct >= 5 ? '大幅' : absPct >= 2 ? '明顯' : absPct >= 0.5 ? '小幅' : '微幅';
  const volText   = volNum >= 2.5 ? '極大量' : volNum >= 1.8 ? '大量放量' : volNum >= 1.3 ? '量能偏大'
                  : volNum >= 0.8 ? '量能正常' : volNum >= 0.5 ? '量縮' : '極度縮量';

  const lines = [];

  if (sig === 'buy') {
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}支撐`);
    if (volNum >= 1.5) lines.push('放量突破，動能偏強，可考慮順勢進場，注意追高風險');
    else if (volNum >= 1.0) lines.push('量價配合，趨勢向好，可分批布局或持倉待漲');
    else lines.push('量縮上漲，動能待確認，建議等待放量再加碼確認');
  } else if (sig === 'sell') {
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}`);
    if (volNum >= 1.5) lines.push('放量下跌，賣壓明顯，建議減碼降低曝險，嚴設停損');
    else lines.push('弱勢格局，量能有限但趨勢偏空，觀望為主，避免攤平');
  } else {
    // watch or unknown
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}`);
    if (absPct < 0.5) lines.push('橫盤整理中，多空拉鋸，方向尚未明朗，靜待突破訊號');
    else if (pct < 0 && volNum < 0.9) lines.push('量縮回測，正常技術整理，支撐未破前維持觀察，不輕易追殺');
    else if (pct > 0 && volNum < 0.9) lines.push('量縮小漲，動能不足，上攻力道待確認，謹慎追高');
    else lines.push('留意關鍵技術位，等待方向確認後再行動');
  }

  if (note) lines.push(`<strong>分析師：</strong>${note}`);

  return lines.join('。<br>');
}

/* ── 浮窗用 inline SVG 走勢圖（直接用 cachedHistory 真實數據）── */
function buildSparkSVG(sym) {
  const hist = (cachedHistory[sym] || []).slice(-30);
  const prices = hist.map(h => h.price).filter(p => p != null && !isNaN(p));
  if (prices.length < 3) return '';

  const W = 268, H = 52;
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || Math.abs(min) * 0.02 || 1;
  const isUp  = prices[prices.length - 1] >= prices[0];
  const color = isUp ? '#10B981' : '#EF4444';
  const gradId = `hbg-${sym}`;

  const toX = i  => (2 + (i / (prices.length - 1)) * (W - 4)).toFixed(1);
  const toY = v  => (H - 4 - ((v - min) / range) * (H - 10) + 3).toFixed(1);

  const linePoints = prices.map((p, i) => `${toX(i)},${toY(p)}`).join(' ');
  const areaPath   =
    `M${toX(0)},${toY(prices[0])}` +
    prices.slice(1).map((p, i) => ` L${toX(i + 1)},${toY(p)}`).join('') +
    ` L${toX(prices.length - 1)},${H} L${toX(0)},${H} Z`;

  // Price range label
  const fmtP = v => v >= 1000 ? v.toLocaleString('en-US', {maximumFractionDigits: 0})
                               : v.toFixed(2);
  const rangeLabel = `$${fmtP(min)} – $${fmtP(max)}`;
  const days = hist.length;

  return { svg: `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="${color}" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path  d="${areaPath}"   fill="url(#${gradId})"/>
      <polyline points="${linePoints}" fill="none" stroke="${color}"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  `, rangeLabel, days };
}

function moveHbTooltip(e) {
  const t  = document.getElementById('hb-tooltip');
  const vw = window.innerWidth, vh = window.innerHeight;
  const th = t.offsetHeight || 300;
  let x = e.clientX + 18, y = e.clientY + 14;
  if (x + 360 > vw) x = e.clientX - 360 - 10;
  if (y + th  > vh) y = e.clientY - th - 10;
  if (x < 4) x = 4;
  if (y < 4) y = 4;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

function hideHbTooltip() {
  document.getElementById('hb-tooltip').classList.remove('visible');
}

/* ── 散戶情緒 Strip (SPY PCR + WSB) ── */
function renderSentimentStrip(sent) {
  if (!sent) return '';
  const pcr = sent.spy_pcr || {};
  const wsb = sent.wsb || {};

  function sentClass(signal) {
    if (!signal) return 'sent-neutral';
    const s = signal.toLowerCase();
    if (s.includes('超買') || s.includes('看多') || s.includes('貪婪')) return 'sent-bull';
    if (s.includes('超賣') || s.includes('看空') || s.includes('恐慌')) return 'sent-bear';
    if (s.includes('極端') && (s.includes('多') || s.includes('bull'))) return 'sent-bear';  // contrarian
    if (s.includes('極端') && (s.includes('空') || s.includes('bear'))) return 'sent-bull';
    return 'sent-neutral';
  }

  const items = [];

  if (pcr.pcr !== undefined && pcr.pcr !== null) {
    const pcrCls = sentClass(pcr.signal || '');
    items.push(`
      <div class="sent-item">
        <div class="sent-label">SPY PCR</div>
        <div class="sent-value ${pcrCls}">${pcr.pcr.toFixed(2)}</div>
        <div class="sent-signal ${pcrCls}">${pcr.signal || '—'}</div>
      </div>`);
  }

  if (items.length && wsb.bullish_pct !== undefined && wsb.bullish_pct !== null) {
    items.push(`<div class="sent-divider"></div>`);
  }

  if (wsb.bullish_pct !== undefined && wsb.bullish_pct !== null) {
    const wsbCls = sentClass(wsb.signal || '');
    items.push(`
      <div class="sent-item">
        <div class="sent-label">WSB 看多 %</div>
        <div class="sent-value ${wsbCls}">${wsb.bullish_pct.toFixed(0)}%</div>
        <div class="sent-signal ${wsbCls}">${wsb.signal || '—'}</div>
      </div>`);
  }

  if (!items.length) return '';

  const dataDate = sent.data_date ? `<span style="font-size:10px;color:var(--text-muted);margin-left:auto">${sent.data_date}</span>` : '';
  return `
    <div class="sentiment-strip section-gap">
      <div class="sent-label" style="font-size:11px;font-weight:600;letter-spacing:0.08em;color:var(--text-muted);white-space:nowrap">散戶情緒指標</div>
      <div class="sent-divider"></div>
      ${items.join('')}
      ${dataDate}
    </div>`;
}

/* ── Tab 切換 ── */
let _activeTab = 'us';
function switchTab(tab, btn) {
  _activeTab = tab;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('tab-' + tab);
  if (target) target.classList.add('active');
  if (btn) btn.classList.add('active');
}
function restoreTab() {
  const target = document.getElementById('tab-' + _activeTab);
  if (!target) return;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  target.classList.add('active');
  const btn = document.querySelector(`.tab-btn[onclick*="'${_activeTab}'"]`);
  if (btn) btn.classList.add('active');
}

/* ── 板塊輪動排行 ── */
function renderSectorRotationBar(watchlist) {
  const SECTOR_MAP = {
    'XLK': '科技', 'XLE': '能源', 'XLF': '金融', 'XLV': '醫療', 'XBI': '生技'
  };
  const lookup = {};
  watchlist.forEach(w => { lookup[w.symbol] = w; });

  const items = Object.entries(SECTOR_MAP)
    .map(([sym, label]) => ({ sym, label, item: lookup[sym] }))
    .filter(x => x.item && x.item.change_pct !== null && x.item.change_pct !== undefined)
    .sort((a, b) => b.item.change_pct - a.item.change_pct);

  if (items.length === 0) return '';

  const maxAbs = Math.max(...items.map(x => Math.abs(x.item.change_pct)), 1);

  const rows = items.map((x, i) => {
    const pct  = x.item.change_pct;
    const w    = Math.abs(pct) / maxAbs * 60;
    const color = pct >= 0 ? 'var(--color-up)' : 'var(--color-down)';
    const rank  = i === 0 ? '🔥' : i === items.length - 1 ? '❄️' : `${i+1}.`;
    return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0">
      <span style="width:22px;font-size:11px;text-align:center">${rank}</span>
      <span style="width:32px;font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${x.sym}</span>
      <span style="width:28px;font-size:11px">${x.label}</span>
      <div style="flex:1;background:var(--card-bg2);border-radius:3px;height:10px;overflow:hidden">
        <div style="width:${w.toFixed(1)}%;height:100%;background:${color};border-radius:3px;transition:width 0.3s"></div>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:${color};width:52px;text-align:right">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>
    </div>`;
  }).join('');

  return `
  <div class="card section-gap">
    <h2>🔄 板塊輪動排行（S&P 500 板塊 ETF）</h2>
    ${rows}
  </div>`;
}

/* ── 台股今日漲跌榜 ── */
function renderTWSummary(twStocks) {
  if (!twStocks || twStocks.length === 0) return '';
  const valid = twStocks.filter(s => s.change_pct !== null && s.change_pct !== undefined);
  if (valid.length === 0) return '';
  const sorted = [...valid].sort((a, b) => b.change_pct - a.change_pct);
  const top3    = sorted.slice(0, 3);
  const bot3    = sorted.slice(-3).reverse();
  const avgPct  = valid.reduce((s, x) => s + x.change_pct, 0) / valid.length;
  const upCount = valid.filter(x => x.change_pct >= 0).length;

  function row(s) {
    const pct = s.change_pct;
    const cls = pct >= 0 ? 'up' : 'down';
    const sym = s.symbol.replace('.TW','');
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px">${s.name} <span style="color:var(--text-muted);font-size:10px">${sym}</span></span>
      <span class="${cls}" style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</span>
    </div>`;
  }

  return `
  <div class="grid-2 section-gap">
    <div class="card" style="padding:16px">
      <h2>💪 今日強勢（Top 3）</h2>
      ${top3.map(row).join('')}
    </div>
    <div class="card" style="padding:16px">
      <h2>📉 今日弱勢（Bottom 3）</h2>
      ${bot3.map(row).join('')}
    </div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:4px">
    追蹤 ${valid.length} 支　上漲 ${upCount} / 下跌 ${valid.length - upCount}　平均 ${avgPct >= 0 ? '+' : ''}${avgPct.toFixed(2)}%
  </div>`;
}

/* ── 台股個股熱力圖 ── */
function renderTWStocksHeatmap(twStocks) {
  if (!twStocks || twStocks.length === 0) {
    return '<div style="color:var(--text-muted);padding:20px;text-align:center">（台股個股資料載入中，明日報告生成後顯示）</div>';
  }

  // 依 sector 分組
  const sectorMap = {};
  twStocks.forEach(s => {
    const sec = s.sector || '其他';
    if (!sectorMap[sec]) sectorMap[sec] = [];
    sectorMap[sec].push(s);
  });

  const THRESHOLDS = { strong_up: 1.0, neutral_up: 0.0, neutral_down: -1.0 };

  function heatBg(pct) {
    if (pct === null || pct === undefined) return ['#1A2235', '#2A354D'];
    if (pct >= 2.0)  return ['rgba(16,185,129,0.45)', 'rgba(16,185,129,0.8)'];
    if (pct >= THRESHOLDS.strong_up) return ['rgba(16,185,129,0.25)', 'rgba(16,185,129,0.5)'];
    if (pct >= THRESHOLDS.neutral_up) return ['rgba(148,163,184,0.15)', 'rgba(148,163,184,0.3)'];
    if (pct >= THRESHOLDS.neutral_down) return ['rgba(239,68,68,0.15)', 'rgba(239,68,68,0.35)'];
    if (pct >= -2.0) return ['rgba(239,68,68,0.25)', 'rgba(239,68,68,0.55)'];
    return ['rgba(239,68,68,0.40)', 'rgba(239,68,68,0.75)'];
  }

  return Object.entries(sectorMap).map(([sector, stocks]) => {
    const blocksHTML = stocks.map(s => {
      const pct   = s.change_pct;
      const price = s.price;
      const sym   = s.symbol; // 保留 .TW 以對應 history key
      const symDisplay = s.symbol.replace('.TW', '');
      const [bg, border] = heatBg(pct);
      const pctStr  = pct !== null && pct !== undefined ? `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%` : 'N/A';
      const pctCls  = pct >= 0 ? 'up' : 'down';
      const priceStr = price !== null && price !== undefined ? price.toLocaleString('zh-TW') : 'N/A';
      const volRatio = s.volume_ratio || null;
      const trend    = s.trend || '';
      const rsi12    = s.rsi_12 || '';

      return `
        <div class="tw-stock-block"
          style="background:${bg};border-color:${border}"
          data-sym="${sym}"
          data-name="${s.name}"
          data-price="${price !== null ? price : ''}"
          data-pct="${pct !== null ? pct : 0}"
          data-vol="${volRatio !== null ? volRatio : ''}"
          data-cat="${sector}"
          data-desc="${sector} · ${trend}"
          data-signal="${pct >= 1 ? 'buy' : pct <= -1 ? 'sell' : 'watch'}"
          data-note="${[rsi12 ? `RSI(12)=${rsi12}` : '', trend ? `趨勢=${trend}` : ''].filter(Boolean).join(' ') || ''}"
          data-w52pos="${s.w52_pos !== null && s.w52_pos !== undefined ? s.w52_pos : ''}"
          data-w52high="${s.w52_high || ''}"
          data-w52low="${s.w52_low || ''}"
          onmouseenter="showHbTooltip(event,this)"
          onmousemove="moveHbTooltip(event)"
          onmouseleave="hideHbTooltip()">
          <div>
            <div class="tw-stock-name">${s.name}</div>
            <div class="tw-stock-sym">${symDisplay}</div>
          </div>
          <div class="tw-stock-right">
            <div class="tw-stock-price">${priceStr}</div>
            <div class="tw-stock-pct ${pctCls}">${pctStr}</div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="tw-heatmap-sector">
        <div class="tw-heatmap-sector-title">${sector}</div>
        <div class="tw-stock-grid">${blocksHTML}</div>
      </div>`;
  }).join('');
}

/* ── 台股三大法人 ── */
function renderInstitutional(inst) {
  if (!inst) return '';
  const rows = inst.detail || [];
  if (!rows.length) return '';

  const maxAbs = Math.max(...rows.map(r => Math.abs(r.net_buy_yi || 0)), 1);

  const rowsHTML = rows.map(r => {
    const val = r.net_buy_yi ?? 0;
    const cls = val >= 0 ? 'inst-val-pos' : 'inst-val-neg';
    const barPct = Math.min((Math.abs(val) / maxAbs) * 100, 100).toFixed(1);
    const barHTML = val >= 0
      ? `<div class="inst-bar-pos" style="width:${barPct}%"></div>`
      : `<div class="inst-bar-neg" style="width:${barPct}%"></div>`;
    const sign = val >= 0 ? '+' : '';
    return `
      <div class="inst-row">
        <div class="inst-name">${r.type || ''}</div>
        <div class="inst-bar-wrap">${barHTML}</div>
        <div class="${cls}">${sign}${val.toFixed(2)}億</div>
      </div>`;
  }).join('');

  const summary = inst.summary ? `
    <div class="inst-row" style="font-weight:700;margin-top:2px;padding-top:8px;border-top:1px solid var(--border)">
      <div class="inst-name">合計</div>
      <div class="inst-bar-wrap"></div>
      <div class="${inst.total_net >= 0 ? 'inst-val-pos' : 'inst-val-neg'}">${inst.total_net >= 0 ? '+' : ''}${inst.total_net?.toFixed(2) ?? '—'}億</div>
    </div>` : '';

  const interp = inst.interpret ? `<div class="inst-interpret">→ ${inst.interpret}</div>` : '';
  const dataDate = inst.data_date || '';

  return `
    <div class="inst-card section-gap">
      <h2>🏦 台股三大法人 ${dataDate ? `<span style="font-weight:400;color:var(--text-muted)">(${dataDate})</span>` : ''}</h2>
      ${rowsHTML}
      ${summary}
      ${interp}
    </div>`;
}

/* ── 盤前掃描渲染 ── */
function renderPremarket(pm) {
  if (!pm || !pm.movers || !pm.movers.length) return '';
  const toneClass = pm.market_tone && pm.market_tone.includes('多') ? 'pm-tone-bull'
                  : pm.market_tone && pm.market_tone.includes('空') ? 'pm-tone-bear'
                  : 'pm-tone-neutral';
  const valid = pm.movers.filter(m => m.premarket_pct !== null && m.premarket_pct !== undefined && !m.error);
  if (!valid.length) return '';

  const moversHTML = valid.map(m => {
    const pct = m.premarket_pct;
    const cls = pct > 0.5 ? 'up' : pct < -0.5 ? 'down' : 'flat';
    const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
    return `
      <div class="pm-mover">
        <div class="pm-mover-sym">${m.symbol}</div>
        <div class="pm-mover-name" title="${m.name}">${m.name}</div>
        <div class="pm-mover-pct ${cls}">${pctStr}</div>
        ${m.premarket_time ? `<div style="font-size:9px;color:var(--text-muted)">${m.premarket_time}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="premarket-panel section-gap" id="premarket-panel">
      <div class="premarket-header">
        <h2 style="font-size:14px">盤前掃描</h2>
        <span class="pm-tone-badge ${toneClass}">${pm.market_tone || '—'}</span>
        ${pm.summary ? `<span style="font-size:11px;color:var(--text-muted)">多${pm.summary.bullish} 空${pm.summary.bearish} 中${pm.summary.neutral}</span>` : ''}
        <span style="font-size:10px;color:var(--text-muted);margin-left:auto">📡 ${pm.fetched_at || ''}</span>
      </div>
      <div class="pm-grid">${moversHTML}</div>
    </div>`;
}

/* ── 即時新聞渲染 ── */
function renderNewsFlash(newsData) {
  if (!newsData || !newsData.news || !newsData.news.length) return '';
  const impactLabel = { bearish: '空', bullish: '多', neutral: '中' };
  const catColor = { Fed:'#f59e0b', Earnings:'#38bdf8', Macro:'#a78bfa', Geo:'#ef4444', Flows:'#10b981' };
  const mode = newsData.mode || 'intraday';
  const isPreopen = mode === 'preopen';

  // 盤前專屬區塊
  let preopenBlock = '';
  if (isPreopen) {
    const fut = newsData.futures || {};
    const outlook = newsData.open_outlook || '';
    const drivers = (newsData.key_drivers || []).map(d => `<li>${d}</li>`).join('');
    const lvl = newsData.watch_levels || {};
    preopenBlock = `
      <div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:10px 12px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:6px">🌅 盤前快訊</div>
        ${fut.es_change||fut.nq_change ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">
          期貨：S&P ${fut.es_change||'—'} &nbsp;|&nbsp; Nasdaq ${fut.nq_change||'—'} &nbsp;|&nbsp; VIX ${fut.vix||'—'}
        </div>` : ''}
        ${outlook ? `<div style="font-size:11px;color:#cbd5e1;line-height:1.5;margin-bottom:4px">📐 ${outlook}</div>` : ''}
        ${drivers ? `<ul style="font-size:11px;color:#94a3b8;margin:4px 0 0 16px;padding:0">${drivers}</ul>` : ''}
        ${lvl.spx_support ? `<div style="font-size:10px;color:#64748b;margin-top:4px">SPX 支撐：${lvl.spx_support.join(' / ')} &nbsp; 壓力：${(lvl.spx_resist||[]).join(' / ')}</div>` : ''}
      </div>`;
  }

  // 宏觀快照（盤中模式）
  let macroBlock = '';
  const snap = newsData.macro_snapshot;
  if (!isPreopen && snap) {
    const sr = newsData.sector_rotation || {};
    macroBlock = `
      <div style="background:rgba(148,163,184,0.05);border:1px solid rgba(148,163,184,0.15);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:10px;color:#94a3b8;line-height:1.8">
        <span style="color:#f59e0b;font-weight:700">Fed</span> ${snap.fed_stance||'—'} &nbsp;
        <span style="color:#60a5fa">10Y</span> ${snap.yield_10y||'—'} &nbsp;
        <span style="color:#a78bfa">DXY</span> ${snap.dxy||'—'} &nbsp;
        <span style="color:#fb923c">WTI</span> ${snap.oil_wti||'—'} &nbsp;
        <span style="color:#f87171">VIX</span> ${snap.vix||'—'}
        ${sr.strong ? `<br>強勢：<span style="color:#10b981">${(sr.strong||[]).join('、')}</span> &nbsp; 弱勢：<span style="color:#ef4444">${(sr.weak||[]).join('、')}</span>` : ''}
      </div>`;
  }

  const items = newsData.news.map(n => {
    const cat = n.category || '';
    const catBadge = cat ? `<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:${catColor[cat]||'#374151'}22;color:${catColor[cat]||'#94a3b8'};border:1px solid ${catColor[cat]||'#374151'}44;margin-left:4px">${cat}</span>` : '';
    return `
    <div class="news-item">
      <span class="news-impact ${n.impact || 'neutral'}">${impactLabel[n.impact] || '中'}</span>
      <div>
        <div class="news-title">${n.title}${catBadge}</div>
        <div class="news-source">${n.source || ''}</div>
      </div>
    </div>`;
  }).join('');

  const updated = newsData.fetched_at || newsData.date || '';
  const modeLabel = isPreopen ? '盤前情報' : '即時新聞';
  return `
    <div class="news-flash" id="news-flash-container">
      <div class="news-flash-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${modeLabel}</span>
        <span style="font-size:9px;color:#475569;font-weight:400" id="news-refresh-status">每10分鐘自動更新</span>
      </div>
      ${preopenBlock}
      ${macroBlock}
      ${items}
      ${updated ? `<div class="news-updated">更新時間：${updated}</div>` : ''}
    </div>
  `;
}

/* ── 宏觀指標列 ── */
function renderMacroStrip(macro) {
  if (!macro || !macro.length) return '';

  // DXY > 105 強勢；US10Y > 4.5% 高壓；VIX > 20 恐慌
  const hints = {
    'DXY':   v => v > 105 ? '強美元' : v < 100 ? '弱美元' : '中性',
    'US10Y': v => v > 4.5 ? '高壓估值' : v < 3.5 ? '寬鬆' : '中性',
    'VIX':   v => v > 25 ? '🔴恐慌' : v > 20 ? '🟡警戒' : '🟢平靜',
  };

  const items = macro.map(m => {
    const val  = m.price !== null ? m.price.toFixed(2) : 'N/A';
    const hint = hints[m.name] ? hints[m.name](m.price || 0) : '';
    return `
      <div class="macro-item" title="${m.desc || m.name}">
        <span class="m-name">${m.name}</span>
        <span class="m-val">${val}</span>
        <span class="m-chg ${pctClass(m.change_pct)}">${fmtPct(m.change_pct)}</span>
        ${hint ? `<span class="m-desc">${hint}</span>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="macro-strip section-gap">
      <span class="macro-label">宏觀</span>
      ${items}
    </div>
  `;
}

/* ── FRED 總經指標列 ── */
function renderFredStrip(fred) {
  if (!fred || !Object.keys(fred).length) return '';
  const show = [
    {key:'DGS10', label:'10Y殖利率', fmt:v=>`${v.toFixed(2)}%`},
    {key:'SPREAD_2Y10Y', label:'2Y-10Y利差', fmt:v=>`${v>=0?'+':''}${v.toFixed(2)}%`,
     cls:v=>v<0?'neg':'pos', tag:v=>v<0?'倒掛':'正常'},
    {key:'FEDFUNDS', label:'基金利率', fmt:v=>`${v.toFixed(2)}%`},
    {key:'T5YIE', label:'通膨預期', fmt:v=>`${v.toFixed(2)}%`},
    {key:'WALCL', label:'Fed資產', fmt:v=>`${(v/1e6).toFixed(2)}兆`},
  ];
  const items = show.map(s => {
    const d = fred[s.key];
    if (!d) return '';
    const val = s.fmt(d.value);
    const cls = s.cls ? s.cls(d.value) : '';
    const tag = s.tag ? s.tag(d.value) : '';
    return `
      <div class="macro-item" title="${d.name || s.label} (${d.date || ''})">
        <span class="m-name">${s.label}</span>
        <span class="m-val">${val}</span>
        ${tag ? `<span class="m-desc" style="color:${cls==='neg'?'var(--red)':'var(--green)'}">${tag}</span>` : ''}
      </div>`;
  }).join('');
  if (!items.trim()) return '';
  return `<div class="macro-strip" style="margin-top:-8px"><span class="macro-label">FRED</span>${items}</div>`;
}

function renderText(text) {
  if (!text || text.includes('失敗')) return '<span style="color:var(--text-muted)">（暫無資料）</span>';
  return `<div class="text-block">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
}

/* ── 解析 risk_line 取得數字評分 ── */
function parseRiskScore(riskLine) {
  if (!riskLine) return null;
  const m = riskLine.match(/score=(\d+)/i);
  return m ? parseInt(m[1]) : null;
}

/* ── 整體風險面板（含評分說明）── */
function renderRiskPanel(data) {
  const signals = data.watchlist || [];
  const greens  = signals.filter(w => w.signal === '🟢').length;
  const yellows = signals.filter(w => w.signal === '🟡').length;
  const reds    = signals.filter(w => w.signal === '🔴').length;
  const score   = parseRiskScore(data.risk_line);
  const scoreStr = score !== null ? `${score}/10` : '—';

  return `
    <div class="risk-panel">
      <div class="risk-top">
        <span class="risk-label">整體風險評分</span>
        ${riskBadge(data.risk_line)}
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)">
          ${scoreStr}
        </span>
        <span class="date">${data.date}</span>
      </div>
      <div class="risk-bottom">
        <div class="risk-signals">
          <span class="sig-count green"><span class="signal green" style="margin:0"></span>${greens}</span>
          <span class="sig-count yellow"><span class="signal yellow" style="margin:0"></span>${yellows}</span>
          <span class="sig-count red"><span class="signal red" style="margin:0"></span>${reds}</span>
        </div>
        <div class="risk-explain">
          <strong>評分說明</strong>：綜合掃描 SPX/NQ 趨勢、VIX 波動率、WTI 油價、
          各板塊信號強弱、多空資金分歧，每項最高 2 分，滿分 8 分。
          分數越高代表當前市場承壓越大、尾部風險越集中。
          <div class="risk-thresholds">
            <span class="risk-thr green">🟢 0–3　市場健康，可積極持倉</span>
            <span class="risk-thr yellow">🟡 4–5　注意波動，控管部位規模</span>
            <span class="risk-thr red">🔴 6–8　高風險，建議降低整體曝險</span>
          </div>
        </div>
      </div>
      ${(data.risk_factors && data.risk_factors.length > 0) ? `
      <div class="risk-factors-section">
        <div class="risk-factors-title">風險因子明細（J段掃描）</div>
        <table class="risk-factors-table">
          <thead><tr><th>段落</th><th>本輪狀況</th><th>分數</th></tr></thead>
          <tbody>
            ${data.risk_factors.map(f => {
              const scoreNum = parseInt((f.score || '').replace(/\D/g,'')) || 0;
              const rowClass = scoreNum >= 2 ? 'row-red' : scoreNum >= 1 ? 'row-yellow' : 'row-green';
              return `<tr class="${rowClass}"><td>${f.segment}</td><td>${f.status || f.indicator || ''}</td><td>${f.score}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : ''}
      <!-- 30日風險走勢已移至今日總結區塊 -->
    </div>
  `;
}

/* ── 今日總結卡片 ── */
function renderDailySummary(data) {
  const watchlist = data.watchlist || [];
  const indices   = data.indices   || [];

  // 市場偏向
  const avgIdx = indices.length
    ? indices.reduce((s, i) => s + (i.change_pct || 0), 0) / indices.length
    : 0;
  const biasLabel = avgIdx >= 0.8 ? '多頭偏強' : avgIdx >= 0.2 ? '小幅收漲'
                  : avgIdx >= -0.2 ? '震盪整理'  : avgIdx >= -0.8 ? '小幅收跌' : '空頭偏弱';
  const biasClass = avgIdx >= 0.2 ? 'up' : avgIdx <= -0.2 ? 'down' : 'flat';

  // 最強 / 最弱標的
  const sorted = [...watchlist].filter(w => w.change_pct !== null)
    .sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));
  const best  = sorted[0];
  const worst = sorted[sorted.length - 1];

  // 信號分布
  const greens  = watchlist.filter(w => w.signal === '🟢').length;
  const reds    = watchlist.filter(w => w.signal === '🔴').length;
  const sigText = greens > reds ? `${greens} 強 / ${reds} 弱` : `${reds} 弱 / ${greens} 強`;

  // AI 操作方向（取 📌 整體策略 那行）
  const advice = data.advice || '';
  const strategyLine = advice.split('\n').find(l => l.includes('📌')) || '';
  const strategyText = strategyLine.replace('📌', '').replace('整體策略：', '').trim()
    || advice.split('\n').find(l => l.trim().length > 10) || '（暫無建議）';

  const bestSym  = best  ? best.symbol.replace('-USD','')  : '—';
  const worstSym = worst ? worst.symbol.replace('-USD','') : '—';

  // 風險燈號整合
  const riskScore = parseRiskScore(data.risk_line);
  const riskHint  = riskScore !== null
    ? (riskScore >= 6 ? '高風險 — 建議降低整體曝險'
     : riskScore >= 4 ? '注意波動 — 控管部位規模'
     : '市場健康 — 可積極持倉')
    : '';

  return `
    <div class="summary-card section-gap">
      <h2>今日總結</h2>
      ${data.risk_line ? `
      <div class="summary-risk-row" style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:200px">
          <div class="summary-risk-bar">
            ${riskBadge(data.risk_line)}
            ${riskHint ? `<span class="summary-risk-hint">${riskHint}</span>` : ''}
            ${riskScore !== null ? `<span class="summary-risk-score">${riskScore}/8</span>` : ''}
          </div>
        </div>
        <div style="flex:1;min-width:280px;max-width:420px" id="summary-risk-trend">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">📈 30日風險走勢</div>
          <img src="./risk-trend.svg" alt="風險走勢"
               style="width:100%;border-radius:6px;background:#0b0f19"
               onerror="this.parentElement.style.display='none'"/>
        </div>
      </div>` : ''}
      <div class="summary-stats">
        <div class="stat-block">
          <div class="stat-label">市場偏向</div>
          <div class="stat-value ${biasClass}">${biasLabel}</div>
          <div class="stat-sub">指數均漲跌 ${avgIdx >= 0 ? '+' : ''}${avgIdx.toFixed(2)}%</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最強標的</div>
          <div class="stat-value up">${bestSym}</div>
          <div class="stat-sub">${best ? fmtPct(best.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最弱標的</div>
          <div class="stat-value down">${worstSym}</div>
          <div class="stat-sub">${worst ? fmtPct(worst.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">信號分布</div>
          <div class="stat-value ${greens > reds ? 'up' : reds > greens ? 'down' : 'flat'}">${sigText}</div>
          <div class="stat-sub">共 ${watchlist.length} 個追蹤標的</div>
        </div>
      </div>
      <div class="summary-advice">
        <div class="advice-label">📌 操作方向</div>
        <div style="white-space:pre-wrap;line-height:1.8;font-size:12px">${(data.advice || '（暫無建議）').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
      ${data.prev_review ? `
      <div class="summary-advice" style="margin-top:10px;border-left-color:var(--text-muted)">
        <div class="advice-label" style="color:var(--text-muted)">🔍 前日建議檢討</div>
        ${data.prev_review.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </div>` : ''}
    </div>
  `;
}

/* ── 圖表初始化（DOM ready 後呼叫）── */
function initCharts(data, history = {}) {
  const date = data.date || '';

  // A区：情緒儀表（CNN 真實數據）
  initGauge(calcSentimentScore(data), data);
  // 來源標注
  const fgEl = document.getElementById('gauge-source');
  if (fgEl) {
    const fg = data.fear_greed;
    if (fg && fg.score !== null) {
      const wk = fg.week_change;
      const wkStr = wk !== null && wk !== undefined
        ? ` / 近一週 ${wk >= 0 ? '+' : ''}${wk.toFixed(1)}`
        : '';
      fgEl.textContent = `CNN Fear & Greed${wkStr}`;
    } else {
      fgEl.textContent = '信號推算（CNN 暫不可用）';
    }
  }

  // 指數 sparklines
  (data.indices || []).forEach((idx, i) => {
    const key  = idx.symbol.replace('-USD', '');
    const hist = history[key] || [];
    const pts  = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(idx.change_pct, idx.name, date);
    const isUp = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (idx.change_pct || 0) >= 0;
    initSparkline(`idx-spark-${i}`, pts, isUp);
  });

  // B区：watchlist sparklines
  (data.watchlist || []).forEach(w => {
    const sym    = w.symbol.replace('-USD', '');
    const safeId = 'spark-' + sym.replace(/[^a-zA-Z0-9]/g, '_');
    const hist   = history[sym] || [];
    const pts    = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(w.change_pct, sym, date);
    const isUp   = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (w.change_pct || 0) >= 0;
    initSparkline(safeId, pts, isUp);
  });
}

/* ── 台股均線操盤框架面板 ── */
function renderTWMAPanel(twMa) {
  if (!twMa || !twMa.taiex) return '';

  const t   = twMa.taiex;
  const abc = t.abc_signal || {};
  const arr = t.arrangement || 'ranging';
  const pos = abc.position_pct ?? '—';

  const arrBadgeClass = {
    bull:    'tw-arr-bull',
    bear:    'tw-arr-bear',
    squeeze: 'tw-arr-squeeze',
    ranging: 'tw-arr-ranging',
  }[arr] || 'tw-arr-ranging';

  const fmtMa = (v, p) => {
    if (v == null) return '<span class="tw-ma-val" style="color:var(--text-muted)">N/A</span>';
    const cls = p > 0 ? 'up' : p < 0 ? 'down' : 'flat';
    const pctStr = p != null ? `(${p >= 0 ? '+' : ''}${p.toFixed(1)}%)` : '';
    return `<span class="tw-ma-val">${Math.round(v).toLocaleString()}</span>
            <span class="tw-ma-pct ${cls}">${pctStr}</span>`;
  };

  // 佈局候選
  const candidates = (twMa.layout_candidates || []).slice(0, 6);

    const p = c.pct_ma120;

    const sym = (c.symbol || '').replace('.TW', '').replace('.TWO', '');

      <div class="tw-candidate-row">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="tw-cand-sym">${sym}</span>
          <span class="tw-cand-name">${c.name || ''}</span>

        <span class="tw-cand-pct ${pctCls}">半年線 ${pctStr}</span>
      </div>`;

  const sm = twMa.summary || {};

  return `
    <div class="tw-panel section-gap">

        <h2>🇹🇼 台股操盤框架（ABC 均線系統）</h2>

          <div class="tw-taiex-price">${t.price ? Math.round(t.price).toLocaleString() : '—'}</div>

        <div class="tw-ma-row">

            ${fmtMa(t.ma20, t.pct_ma20)}
          </div>
          <div class="tw-ma-item">
            <span class="tw-ma-label">季線（60）</span>

          <div class="tw-abc-desc">${abc.description || '—'}</div>
        </div>
        ${sm.total_scanned ? `

          <div class="tw-sum-item">掃描 <span class="tw-sum-val">${sm.total_scanned}</span> 檔</div>
          <div class="tw-sum-item" style="color:#10B981">多頭 <span class="tw-sum-val" style="color:#10B981">${sm.bull_count || 0}</span></div>

/* ── 台股操作方向建議（大盤+整體方向）── */
function renderTWAdvice(twMa, twStocks, fearGreed) {
  if (!twMa || !twMa.taiex) return '';
  const t = twMa.taiex;
  const abc = t.abc_signal || {};
  const arr = t.arrangement || 'ranging';
  const pos = abc.position_pct ?? 50;
  const fg = fearGreed || {};

  const valid = twStocks.filter(s => s.change_pct !== null);
  const avgPct = valid.length ? (valid.reduce((s,x) => s + x.change_pct, 0) / valid.length) : 0;
  const upCount = valid.filter(x => x.change_pct >= 0).length;

  const arrLabel = {bull:'多頭排列',bear:'空頭排列',squeeze:'收斂整理',ranging:'區間盤整'}[arr] || '盤整';

  const lines = [];

  // 大盤持倉建議
  lines.push(`💰 <strong>建議持倉：${pos}%</strong>（${abc.description || arrLabel}）`);

  // 整體策略
  if (arr === 'bull') {
    lines.push(`📌 大盤均線${arrLabel}，趨勢偏多，順勢操作為主。回測月線可視為佈局機會，跌破季線才需警戒。`);
  } else if (arr === 'bear') {
    lines.push(`📌 大盤均線${arrLabel}，趨勢偏空，防守優先。反彈至季線考慮減碼，嚴守停損紀律，等待均線止跌翻揚再積極進場。`);
  } else if (arr === 'squeeze') {
    lines.push(`📌 大盤均線收斂中，即將選擇方向。不宜過度猜測，減少操作頻率，等待突破後再跟進。`);
  } else {
    lines.push(`📌 大盤區間盤整，高出低進為主。月線為短期多空分界，季線為中期支撐，半年線為強弱分水嶺。`);
  }

  // 大盤氣氛
  const biasStr = avgPct >= 0.5 ? '偏多' : avgPct <= -0.5 ? '偏空' : '持平';
  lines.push(`📊 今日追蹤股整體 ${biasStr}（均漲跌 ${avgPct >= 0 ? '+' : ''}${avgPct.toFixed(2)}%，上漲 ${upCount}/${valid.length} 檔）`);

  // 恐慌指數
  if (fg.score !== null && fg.score !== undefined) {
    if (fg.score <= 20) {
      lines.push(`⚠️ 全球恐慌指數 ${fg.score.toFixed(0)}（極度恐慌）— 外資避險情緒濃厚，台股跟跌風險高，但也是中期佈局契機。短線控管部位、拉長佈局週期。`);
    } else if (fg.score <= 35) {
      lines.push(`⚠️ 全球恐慌指數 ${fg.score.toFixed(0)}（恐慌）— 市場情緒偏弱，建議控管整體曝險，避免單筆重押。`);
    } else if (fg.score >= 75) {
      lines.push(`🟢 全球恐慌指數 ${fg.score.toFixed(0)}（貪婪）— 市場樂觀但需留意過熱，逢高可適度獲利了結。`);
    }
  }

  return `
  <div class="summary-card section-gap">
    <h2>📌 台股操作方向建議</h2>
    <div class="summary-advice" style="border-left-color:var(--color-ai)">
      <div style="white-space:pre-wrap;line-height:1.8;font-size:12px">${lines.join('\n')}</div>
    </div>
  </div>`;
}

/* ── 台股新聞及重大事件 ── */
function renderTWNews(newsData, eventsText) {
  const TW_KEYWORDS = ['台積電','tsmc','聯發科','mediatek','鴻海','foxconn','廣達','台灣','taiwan',
    '台股','taiex','半導體','semiconductor','AI晶片','nvidia','輝達','美超微','伺服器','記憶體',
    '聯詠','瑞昱','南亞科','技嘉','微星','緯穎','和碩','台達電','長榮','陽明','航運','封測',
    '加權指數','外資','三大法人','融資','融券','晶豪科','2330','2454','2382','2317','2603'];

  let twNews = [];
  if (newsData && newsData.news) {
    twNews = newsData.news.filter(n => {
      const text = ((n.title || '') + ' ' + (n.source || '')).toLowerCase();
      return TW_KEYWORDS.some(k => text.includes(k.toLowerCase()));
    });
  }

  // 從事件文字中提取台股相關段落
  let twEvents = '';
  if (eventsText && !eventsText.includes('失敗')) {
    const lines = eventsText.split('\n').filter(l =>
      TW_KEYWORDS.some(k => l.toLowerCase().includes(k.toLowerCase()))
    );
    if (lines.length) {
      twEvents = lines.map(l => `<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)22">${l.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`).join('');
    }
  }

  if (!twNews.length && !twEvents) {
    return `
    <div class="card section-gap">
      <h2>📰 台股新聞及重大事件</h2>
      <div style="font-size:12px;color:var(--text-muted);padding:12px 0">暫無台股相關新聞，全球新聞請切換至美股總經頁面查看</div>
    </div>`;
  }

  const impactLabel = { bearish: '空', bullish: '多', neutral: '中' };
  const catColor = { Fed:'#f59e0b', Earnings:'#38bdf8', Macro:'#a78bfa', Geo:'#ef4444', Flows:'#10b981' };

  const newsHTML = twNews.map(n => {
    const cat = n.category || '';
    const catBadge = cat ? `<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:${catColor[cat]||'#374151'}22;color:${catColor[cat]||'#94a3b8'};border:1px solid ${catColor[cat]||'#374151'}44;margin-left:4px">${cat}</span>` : '';
    return `
    <div class="news-item">
      <span class="news-impact ${n.impact || 'neutral'}">${impactLabel[n.impact] || '中'}</span>
      <div>
        <div class="news-title">${n.title}${catBadge}</div>
        <div class="news-source">${n.source || ''}</div>
      </div>
    </div>`;

  return `

    <h2>📰 台股新聞及重大事件</h2>
    ${twEvents}
    ${newsHTML}
    ${newsData ? `<div class="news-updated" style="font-size:10px;color:var(--text-muted);margin-top:6px">更新時間：${newsData.fetched_at || newsData.date || ''}</div>` : ''}
  </div>`;
}

function renderOkxContracts(contracts) {
  if (!contracts || !contracts.length) return '';
  const cats = {};
  contracts.forEach(c => {
    const cat = c.category || '其他';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(c);
  });
  let cards = '';
  for (const [cat, items] of Object.entries(cats)) {
    items.forEach(c => {
      const pct = c.change_pct;
      const color = pct > 0.5 ? '#22c55e' : pct < -0.5 ? '#ef4444' : '#eab308';
      const bg = pct > 0.5 ? 'rgba(34,197,94,0.08)' : pct < -0.5 ? 'rgba(239,68,68,0.08)' : 'rgba(234,179,8,0.05)';
      const arrow = pct > 0 ? '▲' : pct < 0 ? '▼' : '–';
      const price = c.price ? `$${c.price.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}` : 'N/A';
      const pctStr = pct != null ? `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%` : 'N/A';
      cards += `
        <div style="background:${bg};border:1px solid ${color}33;border-radius:10px;padding:12px 14px;min-width:130px">
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px">${cat}</div>
          <div style="font-size:14px;font-weight:600">${c.name}</div>
          <div style="font-size:18px;font-weight:700;color:${color};margin:4px 0">${price}</div>
          <div style="font-size:13px;color:${color}">${arrow} ${pctStr}</div>
        </div>`;
    });
  }
  return `
    <div class="section-gap">
      <div class="section-title" style="padding:0 2px;margin-bottom:10px">🪙 OKX 永續合約標的</div>
      <div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:6px">

      <div style="font-size:10px;color:var(--text-muted);margin-top:6px;text-align:right">資料來源：OKX API 即時報價</div>
    </div>`;
}

function renderGridBotPanel(gridData) {
  if (!gridData || (!gridData.btc && !gridData.eth)) return '';

  function botCard(bot) {
    if (!bot || bot.status !== 'running') return '';
    const sym = bot.symbol.split('/')[0];
    const icon = sym === 'BTC' ? '₿' : 'Ξ';
    const price = bot.current_price || 0;
    const grid = bot.grid || {};
    const upper = grid.upper || 0;
    const lower = grid.lower || 0;
    const range = upper - lower || 1;
    const pricePct = Math.max(0, Math.min(100, ((price - lower) / range) * 100));

    // Position in range color
    const posColor = pricePct < 20 ? '#ef4444' : pricePct < 40 ? '#f59e0b' : pricePct < 60 ? '#eab308' : pricePct < 80 ? '#22c55e' : '#10b981';

    const filledBuys = (bot.filled_buys || []).length;
    const filledSells = (bot.filled_sells || []).length;
    const openBuys = (bot.buy_orders || []).length;
    const openSells = (bot.sell_orders || []).length;
    const profit = bot.total_profit || 0;
    const profitColor = profit > 0 ? '#22c55e' : profit < 0 ? '#ef4444' : 'var(--text-muted)';

    // Grid levels visualization
    const buyLevels = (grid.buy_levels || []).slice().reverse();
    const sellLevels = grid.sell_levels || [];
    const allLevels = [...buyLevels.map(l => ({price:l, type:'buy'})), ...sellLevels.map(l => ({price:l, type:'sell'}))];
    allLevels.sort((a,b) => a.price - b.price);

    const levelDots = allLevels.map(l => {
      const pct = ((l.price - lower) / range) * 100;
      const c = l.type === 'buy' ? '#22c55e' : '#ef4444';
      return `<div style="position:absolute;left:${pct}%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:${c};opacity:0.7" title="${l.type} @ $${l.price.toLocaleString()}"></div>`;
    }).join('');

    const params = bot.params || {};
    const updated = bot.updated_at || bot.last_check || '';

    return `
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:18px;flex:1;min-width:280px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

function renderCryptoNews(newsData) {

  const cryptoNews = newsData.news.filter(n => {
    const text = (n.title || '') + (n.summary || '');
    return cryptoKw.some(kw => text.toLowerCase().includes(kw.toLowerCase()));
  });
  if (!cryptoNews.length) return `
  <div class="section-gap">
    <div class="card"><h2>📰 加密貨幣新聞</h2><div style="color:var(--text-muted);padding:10px">今日暫無加密相關新聞</div></div>

      <div>
        <div class="news-title">${n.title}</div>
        <div class="news-source">${n.source || ''} · ${n.time || ''}</div>

  </div>`;
}

// ── 恐慌指數歷史走勢圖 ──────────────────────────────────────
async function loadFGTrend() {
  try {
    let data;
    try { data = await fetchJSON('reports/history/fear-greed.json'); }
    catch { try { data = await (await fetch('./fear-greed-history.json?' + Date.now())).json(); } catch { return; } }
    if (!data) return;
    if (!data || data.length < 2) return;
    const el = document.getElementById('fg-trend');
    if (!el) return;
    const recent = data.slice(-14);  // 最近 14 天
    const W = 200, H = 50, PAD = 2;
    const scores = recent.map(d => d.score);
    const min = Math.min(...scores, 0);
    const max = Math.max(...scores, 100);
    const range = max - min || 1;
    const toX = i => PAD + (i / (scores.length - 1)) * (W - PAD * 2);
    const toY = v => H - PAD - ((v - min) / range) * (H - PAD * 2);
    const pts = scores.map((s, i) => `${toX(i).toFixed(1)},${toY(s).toFixed(1)}`).join(' ');
    const last = scores[scores.length - 1];
    const prev = scores[scores.length - 2];
    const color = last <= 25 ? '#ef4444' : last <= 50 ? '#f59e0b' : '#10b981';
    const trend = last > prev ? '↑' : last < prev ? '↓' : '→';
    const trendColor = last > prev ? '#10b981' : last < prev ? '#ef4444' : '#94a3b8';
    // Area path
    const area = `M${toX(0).toFixed(1)},${toY(scores[0]).toFixed(1)} ` +
      scores.slice(1).map((s,i) => `L${toX(i+1).toFixed(1)},${toY(s).toFixed(1)}`).join(' ') +
      ` L${toX(scores.length-1).toFixed(1)},${H} L${toX(0).toFixed(1)},${H} Z`;

    el.innerHTML = `
      <div style="text-align:center">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">
          恐慌指數走勢（${recent.length}天）
          <span style="color:${trendColor};font-weight:600">${trend} ${last.toFixed(0)}</span>
        </div>
        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;margin:0 auto">
          <defs><linearGradient id="fg-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient></defs>
          <path d="${area}" fill="url(#fg-grad)"/>
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="${toX(scores.length-1).toFixed(1)}" cy="${toY(last).toFixed(1)}" r="3" fill="${color}"/>
          <!-- 25/50/75 threshold lines -->
          <line x1="0" y1="${toY(25).toFixed(1)}" x2="${W}" y2="${toY(25).toFixed(1)}" stroke="#ef444433" stroke-dasharray="2,3"/>
          <line x1="0" y1="${toY(50).toFixed(1)}" x2="${W}" y2="${toY(50).toFixed(1)}" stroke="#94a3b833" stroke-dasharray="2,3"/>
        </svg>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);padding:0 4px">
          <span>${recent[0].date.slice(5)}</span>
          <span>${recent[recent.length-1].date.slice(5)}</span>
        </div>
      </div>`;

// ── 新聞 Auto-Refresh（每10分鐘，只更新新聞區塊）──────────────
async function refreshNews() {
  try {
    const nd = await fetchJSON('news-feed.json');
    if (!nd || !nd.news) return;
    window._newsData = nd;
    // 只重繪新聞區塊，不重跑整個 render
    const container = document.getElementById('news-flash-container');
    if (container) {
      const parent = container.parentElement;
      const temp = document.createElement('div');
      temp.innerHTML = renderNewsFlash(nd);
      const newNode = temp.firstElementChild;
      if (newNode) parent.replaceChild(newNode, container);
    }
    const statusEl = document.getElementById('news-refresh-status');
    if (statusEl) {
      const now = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
      statusEl.textContent = `已更新 ${now}`;
    }
  } catch (e) { /* 靜默失敗，不影響主頁面 */ }
}
// 每10分鐘刷新一次新聞（600000ms）
setInterval(refreshNews, 600000);

// ── 盤前資料 Auto-Refresh（每5分鐘）──────────────────────────────
async function refreshPremarket() {
  try {
    const pm = await fetchJSON('premarket.json');
    if (!pm || !pm.movers) return;
    window._premkt = pm;
    const existing = document.getElementById('premarket-panel');
    if (existing) {
      const temp = document.createElement('div');
      temp.innerHTML = renderPremarket(pm);
      const newNode = temp.firstElementChild;
      if (newNode) existing.replaceWith(newNode);
    }
  } catch (e) { /* 靜默失敗 */ }
}
setInterval(refreshPremarket, 300000);
