<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Intel — 每日美股市場情報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.2/dist/apexcharts.min.js"></script>
  <style>
    :root {
      --bg-dark:    #0B0F19;
      --card-bg:    #1A2235;
      --card-bg2:   #1E2840;
      --border:     #2A354D;
      --border-ai:  #6366F1;
      --text-main:  #FFFFFF;
      --text-muted: #94A3B8;
      --color-up:   #10B981;
      --color-down: #EF4444;
      --color-ai:   #6366F1;
      --color-warn: #F59E0B;
      --color-blue: #38BDF8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: rgba(26, 34, 53, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366F1, #38BDF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .market-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .market-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-up);
      box-shadow: 0 0 6px var(--color-up);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-meta { color: var(--text-muted); font-size: 12px; }

    /* ── Layout ── */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-gauge { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: stretch; }
    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-gauge { grid-template-columns: 1fr; }
    }
    .section-gap { margin-top: 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Base Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--color-ai);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.12);
    }
    .card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── A区：情緒儀表板 ── */
    .gauge-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color 0.2s;
    }
    .gauge-card:hover { border-color: var(--color-ai); }
    .gauge-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0;
      align-self: flex-start;
    }
    #sentiment-gauge { width: 100%; }
    .gauge-legend {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 8px;
      margin-top: 4px;
    }

    /* ── AI Hero Card ── */
    .ai-hero {
      background: linear-gradient(135deg, #1A2235, #141929);
      border: 1px solid var(--border-ai);
      border-radius: 14px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .ai-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .ai-hero-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-ai);
      margin-bottom: 12px;
    }
    .ai-hero-label .ai-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-ai);
      box-shadow: 0 0 8px var(--color-ai);
    }
    .ai-summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* ── 指數卡片 ── */
    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 8px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .index-card:hover { transform: translateY(-2px); border-color: var(--color-ai); }
    .index-card .name { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    .index-card .price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .index-card .change {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }
    .index-card .index-spark { margin-top: 6px; height: 40px; }
    .up   { color: var(--color-up); }
    .down { color: var(--color-down); }
    .flat { color: var(--text-muted); }

    /* ── 風險面板 ── */
    .risk-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 20px;
    }
    .risk-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .risk-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-green  { background: rgba(16,185,129,0.12); color: var(--color-up);   border: 1px solid rgba(16,185,129,0.4);  box-shadow: 0 0 12px rgba(16,185,129,0.15); }
    .risk-yellow { background: rgba(245,158,11,0.12); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.4);  box-shadow: 0 0 12px rgba(245,158,11,0.15); }
    .risk-red    { background: rgba(239,68,68,0.12);  color: var(--color-down); border: 1px solid rgba(239,68,68,0.4);   box-shadow: 0 0 12px rgba(239,68,68,0.15); }
    .risk-top .date { margin-left: auto; color: var(--text-muted); font-size: 12px; }
    /* 信號分布列 */
    .risk-bottom {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 640px) { .risk-bottom { grid-template-columns: 1fr; } }
    .risk-signals {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sig-count {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--card-bg2);
    }
    .sig-count.green  { color: var(--color-up); }
    .sig-count.yellow { color: var(--color-warn); }
    .sig-count.red    { color: var(--color-down); }
    /* 評分說明 */
    .risk-explain {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }
    .risk-explain strong { color: var(--text-main); font-weight: 600; }
    .risk-thresholds {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .risk-thr {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-thr.green  { background: rgba(16,185,129,0.1); color: var(--color-up); }
    .risk-thr.yellow { background: rgba(245,158,11,0.1); color: var(--color-warn); }
    .risk-thr.red    { background: rgba(239,68,68,0.1);  color: var(--color-down); }

    /* ── 風險因子明細 ── */
    .risk-factors-section {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .risk-factors-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .risk-factors-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .risk-factors-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
    }
    .risk-factors-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(42,53,77,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .risk-factors-table tr.row-green td { color: var(--color-up); }
    .risk-factors-table tr.row-yellow td { color: var(--color-warn); }
    .risk-factors-table tr.row-red td { color: var(--color-down); }
    .risk-factors-table tr.row-green { background: rgba(16,185,129,0.03); }
    .risk-factors-table tr.row-yellow { background: rgba(245,158,11,0.05); }
    .risk-factors-table tr.row-red { background: rgba(239,68,68,0.06); }

    /* ── 宏觀指標列 ── */
    .macro-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      align-items: center;
    }
    .macro-strip .macro-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .macro-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .macro-item .m-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .macro-item .m-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .macro-item .m-chg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .macro-item .m-desc {
      font-size: 10px;
      color: var(--text-muted);
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }
    /* 量能徽章 */
    .vol-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 3px;
    }
    .vol-spike  { background: rgba(245,158,11,0.15); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.35); }
    .vol-normal { background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── 技術指標列 ── */
    .wi-tech {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px;
    }
    .tech-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 600;
      padding: 1px 5px; border-radius: 3px;
      white-space: nowrap;
    }
    .tech-bull   { background: rgba(16,185,129,0.12); color: #10B981; border: 1px solid rgba(16,185,129,0.3); }
    .tech-bear   { background: rgba(239,68,68,0.12);  color: #EF4444; border: 1px solid rgba(239,68,68,0.3); }
    .tech-neutral{ background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid var(--border); }
    .tech-warn   { background: rgba(245,158,11,0.12); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.3); }

    /* ── Premarket Panel ── */
    .premarket-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--color-blue);
      border-radius: 12px;
      padding: 16px;
    }
    .premarket-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .pm-tone-badge {
      font-size: 11px; font-weight: 700; padding: 2px 9px;
      border-radius: 10px; border: 1px solid;
    }
    .pm-tone-bull { color: var(--color-up); border-color: var(--color-up); background: rgba(16,185,129,0.1); }
    .pm-tone-bear { color: var(--color-down); border-color: var(--color-down); background: rgba(239,68,68,0.1); }
    .pm-tone-neutral { color: var(--color-warn); border-color: var(--color-warn); background: rgba(245,158,11,0.1); }
    .pm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
    }
    .pm-mover {
      background: var(--card-bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
    }
    .pm-mover-sym { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .pm-mover-name { font-size: 11px; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pm-mover-pct { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .pm-mover-pct.up   { color: var(--color-up); }
    .pm-mover-pct.down { color: var(--color-down); }
    .pm-mover-pct.flat { color: var(--text-muted); }

    /* buy / watch / sell badges */
    .action-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      cursor: default;
    }
    .sig-buy   { background: rgba(16,185,129,0.18); color: #10B981; border: 1px solid rgba(16,185,129,0.4); }
    .sig-watch { background: rgba(56,189,248,0.12); color: #38BDF8; border: 1px solid rgba(56,189,248,0.35); }
    .sig-sell  { background: rgba(239,68,68,0.15);  color: #EF4444; border: 1px solid rgba(239,68,68,0.4); }

    /* ── AI 市場標題 ── */
    .ai-market-title {
      font-size: 13px;
      color: var(--color-ai);
      font-style: italic;
      margin-bottom: 10px;
      padding-left: 10px;
      border-left: 2px solid var(--color-ai);
      line-height: 1.5;
    }

    /* ── 標的短評 ── */
    .wi-note {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* ── 今日總結 ── */
    .summary-card {
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .summary-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) { .summary-stats { grid-template-columns: repeat(2, 1fr); } }
    .stat-block {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-block .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-block .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
    }
    .stat-block .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .summary-advice {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.7;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--color-ai);
      border-radius: 8px;
    }
    .summary-advice .advice-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-ai);
      margin-bottom: 6px;
    }

    /* 今日總結 — 風險燈號列 */
    .summary-risk-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .summary-risk-hint {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      min-width: 0;
    }
    .summary-risk-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── 信號燈點 ── */
    .signal { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .signal.green  { background: var(--color-up);   box-shadow: 0 0 6px var(--color-up); }
    .signal.yellow { background: var(--color-warn); box-shadow: 0 0 6px var(--color-warn); }
    .signal.red    { background: var(--color-down); box-shadow: 0 0 6px var(--color-down); }
    .signal.gray   { background: var(--text-muted); }

    /* ── C区：板塊熱力圖 ── */
    .heatmap-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) {
      .heatmap-wrap { grid-template-columns: 1fr; }
    }
    .heatmap-sector {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .heatmap-sector-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .heatmap-blocks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .heatmap-block {
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 6px;
      text-align: center;
      cursor: default;
      transition: transform 0.15s, filter 0.15s;
    }
    .heatmap-block:hover { transform: scale(1.04); filter: brightness(1.2); cursor: pointer; }
    .hb-symbol {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text-main);
      margin-bottom: 3px;
    }
    .hb-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── 熱力圖 Tooltip ── */
    #hb-tooltip {
      position: fixed;
      z-index: 9999;
      background: #131c2e;
      border: 1px solid #2d3f5e;
      border-radius: 14px;
      padding: 0;
      min-width: 300px;
      max-width: 360px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.65), 0 0 0 1px rgba(99,102,241,0.08);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-size: 13px;
      overflow: hidden;

<body>

<!-- Heatmap Tooltip -->
<div id="hb-tooltip"></div>

<header>
  <div class="header-left">
    <h1>📊 Market Intel</h1>
    <div class="market-status" id="market-status">
      <span class="dot"></span>
      <span id="market-status-text">載入中</span>
    </div>
  </div>
  <div class="header-meta" id="report-meta">—</div>
</header>

<div class="container">
  <div id="date-nav"></div>
  <div id="app">
    <div class="loading">⏳ 載入市場數據中...</div>
  </div>
</div>

<script>
const GITHUB_USER = 'Rostov12';
const GITHUB_REPO = 'market-intel';
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

/* ── 全域狀態 ── */
let allDates      = [];
let currentIdx    = 0;
let cachedHistory = {};

/* ── 日期導航 UI ── */
function renderDateNavUI() {
  const nav = document.getElementById('date-nav');
  if (!nav || !allDates.length) return;
  const isLatest = currentIdx === allDates.length - 1;
  const isFirst  = currentIdx === 0;
  const date = allDates[currentIdx];
  nav.innerHTML = `
    <div class="date-nav">
      <button class="date-btn" onclick="loadDate(${currentIdx - 1})" ${isFirst ? 'disabled' : ''}>‹ 前一日</button>
      <span class="date-current">${date}${isLatest ? '<span class="date-badge">最新</span>' : ''}</span>
      <button class="date-btn" onclick="loadDate(${currentIdx + 1})" ${isLatest ? 'disabled' : ''}>後一日 ›</button>
    </div>
  `;
}

async function loadDate(idx) {
  if (idx < 0 || idx >= allDates.length) return;
  currentIdx = idx;
  renderDateNavUI();
  document.getElementById('app').innerHTML = '<div class="loading">⏳ 載入中...</div>';
  try {
    const data = await fetchJSON(`reports/${allDates[idx]}.json`);
    render(data, cachedHistory);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 載入失敗：${e.message}</div>`;
  }
}

/* ── D区：30天趨勢折線圖 ── */
function initTrendChart(history) {
  const el = document.querySelector('#trend-chart');
  if (!el || typeof ApexCharts === 'undefined') return;

  const SYMBOLS = [
    { key: 'SMH', name: '半導體 SMH', color: '#6366F1' },
    { key: 'GLD', name: '黃金 GLD',   color: '#F59E0B' },
    { key: 'BTC', name: 'Bitcoin',    color: '#F97316' },
  ];

  const series = [];
  let categories = [];

  SYMBOLS.forEach(s => {
    const hist = (history[s.key] || []).slice(-30);
    if (hist.length < 3) return;
    if (!categories.length) categories = hist.map(h => h.date);
    const first = hist[0].price || 1;
    series.push({
      name:  s.name,
      color: s.color,
      data:  hist.map(h => +((h.price - first) / first * 100).toFixed(2)),
    });
  });

  if (!series.length) {
    el.innerHTML = '<div class="trend-placeholder">📊 歷史數據累積中，5個交易日後啟用</div>';
    return;
  }

  new ApexCharts(el, {
    series,
    chart: {
      type: 'line', height: 220, background: 'transparent',
      toolbar: { show: false }, zoom: { enabled: false },
      animations: { enabled: false },
    },
    stroke: { curve: 'straight', width: 1.8 },
    xaxis: {
      categories,
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'Inter' },
        formatter: v => v ? v.slice(5) : '',
      },
      tickAmount: 6, axisBorder: { show: false }, axisTicks: { show: false },
    },
    yaxis: {
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'JetBrains Mono' },
        formatter: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%',
      },
    },
    grid: { borderColor: '#2A354D', strokeDashArray: 3 },
    legend: { labels: { colors: '#94A3B8' }, fontSize: '12px', fontFamily: 'Inter' },
    tooltip: {
      theme: 'dark',
      y: { formatter: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%' },
      x: { show: true },
    },
    theme: { mode: 'dark' },
  }).render();
}

async function fetchJSON(path) {
  const res = await fetch(`${RAW_BASE}/${path}?_=${Date.now()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function pctClass(pct) {
  if (pct === null || pct === undefined) return 'flat';
  return pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
}

function fmtPct(pct) {
  if (pct === null || pct === undefined) return 'N/A';
  const sign = pct >= 0 ? '+' : '';
  return `${sign}${pct.toFixed(2)}%`;
}

function fmtPrice(price) {
  if (price === null || price === undefined) return 'N/A';
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function signalDot(sig) {
  if (sig === '🟢') return '<span class="signal green"></span>';
  if (sig === '🟡') return '<span class="signal yellow"></span>';
  if (sig === '🔴') return '<span class="signal red"></span>';
  return '<span class="signal gray"></span>';
}

function riskBadge(riskLine) {
  if (!riskLine) return '<span class="risk-badge risk-green">🟢 綠燈 — 正常</span>';
  const cls = riskLine.includes('紅') ? 'risk-red'
            : riskLine.includes('黃') ? 'risk-yellow'
            : 'risk-green';
  const icon = riskLine.includes('紅') ? '🔴' : riskLine.includes('黃') ? '🟡' : '🟢';
  return `<span class="risk-badge ${cls}">${icon} ${riskLine}</span>`;
}

function updateMarketStatus() {
  const now = new Date();
  const hour = now.getUTCHours();
  const min  = now.getUTCMinutes();
  const weekday = now.getUTCDay();
  const statusEl = document.getElementById('market-status-text');
  const dotEl    = document.querySelector('.market-status .dot');
  if (!statusEl || !dotEl) return;
  const isWeekday = weekday >= 1 && weekday <= 5;
  const totalMin  = hour * 60 + min;
  const isOpen    = isWeekday && totalMin >= 810 && totalMin < 1200; // 13:30–20:00 UTC
  if (isOpen) {
    statusEl.textContent = '🟢 Market Open';
    dotEl.style.background = '#10B981';
    dotEl.style.boxShadow  = '0 0 6px #10B981';
    dotEl.style.animation  = '';
  } else {
    statusEl.textContent = '⚫ Market Closed';
    dotEl.style.background = '#94A3B8';
    dotEl.style.boxShadow  = 'none';
    dotEl.style.animation  = 'none';
  }
}

/* ── 可重現的偽亂數（seed = symbol + date）── */
function seededRNG(seed) {
  let s = seed.split('').reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  return () => {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    return ((s ^ (s >>> 16)) >>> 0) / 0xffffffff;
  };
}

/* ── 生成 9 個偽歷史數據點（末尾 = change_pct）── */
function generateSparkData(changePct, symbol, date) {
  const rng = seededRNG((symbol || '') + (date || ''));
  const end = changePct || 0;
  const pts = [];
  let cur = end * 0.3;
  for (let i = 0; i < 8; i++) {
    cur += (rng() - 0.48) * Math.abs(end || 0.5) * 0.6;
    pts.push(+cur.toFixed(3));
  }
  pts.push(+end.toFixed(3));
  return pts;
}

/* ── A区：情緒分數（優先用 CNN 真實數據）── */
function calcSentimentScore(data) {
  // 有 CNN 真實數據就直接用
  const fg = data.fear_greed;
  if (fg && fg.score !== null && fg.score !== undefined) {
    return Math.round(fg.score);
  }
  // fallback：由信號比例 + 風險燈號推算
  const signals = (data.watchlist || []).map(w => w.signal);
  const total   = signals.length || 1;
  const greens  = signals.filter(s => s === '🟢').length;
  const yellows = signals.filter(s => s === '🟡').length;
  let score = Math.round(((greens + yellows * 0.5) / total) * 100);
  if (data.risk_line) {
    if (data.risk_line.includes('紅')) score = Math.min(score, 28);
    else if (data.risk_line.includes('黃')) score = Math.min(score, 52);
  }
  const idxArr = data.indices || [];
  if (idxArr.length) {
    const avg = idxArr.reduce((s, i) => s + (i.change_pct || 0), 0) / idxArr.length;
    score = Math.min(100, Math.max(0, score + Math.round(avg * 3)));
  }
  return Math.max(0, Math.min(100, score));
}

/* ── ApexCharts 情緒半圓儀表 ── */
function initGauge(score, data) {
  const el = document.querySelector('#sentiment-gauge');
  if (!el || typeof ApexCharts === 'undefined') return;
  const color = score >= 65 ? '#10B981' : score >= 45 ? '#F59E0B' : '#EF4444';
  // CNN 有標籤用 CNN，否則推算
  const fg = (data || {}).fear_greed;
  const label = (fg && fg.label) ? fg.label
              : score >= 75 ? '極度貪婪'
              : score >= 60 ? '貪婪'
              : score >= 45 ? '中性'
              : score >= 30 ? '恐慌'
              : '極度恐慌';
  new ApexCharts(el, {
    series: [score],
    chart: { type: 'radialBar', height: 170, background: 'transparent', toolbar: { show: false } },
    plotOptions: {
      radialBar: {
        startAngle: -90, endAngle: 90,
        hollow: { size: '55%', background: 'transparent' },
        track: { background: '#2A354D', strokeWidth: '97%' },
        dataLabels: {
          name:  { show: true, color: '#94A3B8', fontSize: '11px', offsetY: 16, formatter: () => label },
          value: { color, fontSize: '26px', fontWeight: 700, fontFamily: 'JetBrains Mono', offsetY: -12,
                   formatter: v => v }
        }
      }
    },
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark', type: 'horizontal',
        colorStops: [
          [{ offset: 0, color: '#EF4444', opacity: 1 },
           { offset: 50, color: '#F59E0B', opacity: 1 },
           { offset: 100, color: '#10B981', opacity: 1 }]
        ]
      }
    },
    stroke: { lineCap: 'round' },
    labels: [label],
    theme: { mode: 'dark' }
  }).render();
}

/* ── ApexCharts Sparkline ── */
function initSparkline(elId, data, isUp) {
  const el = document.querySelector(`#${elId}`);
  if (!el || typeof ApexCharts === 'undefined') return;
  const color = isUp ? '#10B981' : '#EF4444';
  const glow  = isUp ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)';
  new ApexCharts(el, {
    series: [{ data }],
    chart: {
      type: 'area', height: 36, background: 'transparent',
      sparkline: { enabled: true },
      animations: { enabled: false },
      dropShadow: { enabled: true, top: 0, left: 0, blur: 3, color: glow, opacity: 0.5 }
    },
    stroke: { curve: 'straight', width: 1.5, colors: [color] },
    fill: {
      type: 'gradient',
      gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 100] },
      colors: [color]
    },
    tooltip: { enabled: false },
    theme: { mode: 'dark' }
  }).render();
}

/* ── 渲染函數 ── */
function renderIndices(indices, date) {
  return indices.map((i, idx) => `
    <div class="index-card">
      <div class="name">${i.name}</div>
      <div class="price ${pctClass(i.change_pct)}">${fmtPrice(i.price)}</div>
      <div class="change ${pctClass(i.change_pct)}">${fmtPct(i.change_pct)}</div>
      <div class="index-spark" id="idx-spark-${idx}"></div>
    </div>
  `).join('');
}

function renderSignalBadge(sigArr, symbol) {
  if (!sigArr || !sigArr.length) return '';
  const sym = symbol.replace('-USD','').toUpperCase();
  const s = sigArr.find(s => s.symbol === sym);
  if (!s) return '';
  const cfg = {
    buy:   { cls: 'sig-buy',   label: 'BUY' },
    watch: { cls: 'sig-watch', label: 'WATCH' },
    sell:  { cls: 'sig-sell',  label: 'SELL' },
  };
  const c = cfg[s.signal_type];
  if (!c) return '';
  const title = s.note ? ` title="${s.note}"` : '';
  return `<span class="action-badge ${c.cls}"${title}>${c.label}</span>`;
}

function renderWatchlist(items, date, signals, itemNotes) {
  return items.map(w => {
    const symbol = w.symbol.replace('-USD', '');
    const desc   = w.name.includes('（') ? w.name.split('（')[1].replace('）','') : w.name;
    const safeId = 'spark-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
    const vr = w.volume_ratio;
    const volBadge = vr
      ? `<span class="vol-badge ${vr >= 1.5 ? 'vol-spike' : 'vol-normal'}">${vr.toFixed(1)}x</span>`
      : '';
    const actionBadge = renderSignalBadge(signals, w.symbol);
    const note = (itemNotes || {})[symbol] || '';

    // 技術指標 badges
    function techClass(val, bullish, bearish) {
      if (!val) return 'tech-neutral';
      if (val === bullish) return 'tech-bull';
      if (val === bearish) return 'tech-bear';
      return 'tech-neutral';
    }
    const trendBadge = w.trend
      ? `<span class="tech-badge ${techClass(w.trend,'多頭','空頭')}">${w.trend}</span>` : '';
    const macdBadge  = w.macd_signal
      ? `<span class="tech-badge ${w.macd_signal.includes('金叉') ? 'tech-bull' : w.macd_signal.includes('死叉') ? 'tech-bear' : w.macd_signal==='多頭' ? 'tech-bull' : 'tech-bear'}">MACD ${w.macd_signal}</span>` : '';
    const rsiBadge   = w.rsi_12 != null
      ? `<span class="tech-badge ${w.rsi_status && w.rsi_status.includes('超賣') ? 'tech-bull' : w.rsi_status && w.rsi_status.includes('超買') ? 'tech-warn' : 'tech-neutral'}">RSI ${w.rsi_12}</span>` : '';
    const biasBadge  = w.bias_ma5 != null
      ? `<span class="tech-badge tech-neutral">乖離${w.bias_ma5>0?'+':''}${w.bias_ma5.toFixed(1)}%</span>` : '';
    const techRow = (trendBadge || macdBadge || rsiBadge || biasBadge)
      ? `<div class="wi-tech">${trendBadge}${macdBadge}${rsiBadge}${biasBadge}</div>` : '';

    return `
      <div class="watchlist-item">
        <div class="wi-left">
          ${signalDot(w.signal)}
          <div style="min-width:0">
            <div class="symbol">${symbol}${volBadge}${actionBadge}</div>
            <div class="desc">${desc}<span class="tag">${w.category}</span></div>
            ${note ? `<div class="wi-note" title="${note}">${note}</div>` : ''}
            ${techRow}
          </div>
        </div>
        <div class="wi-spark" id="${safeId}"></div>
        <div class="wi-right">
          <div class="price-val">${fmtPrice(w.price)}</div>
          <div class="pct ${pctClass(w.change_pct)}">${fmtPct(w.change_pct)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderSectorHeatmap(watchlist, signals, itemNotes) {
  const sectors = [
    { name: '科技與AI',  icon: '💻', keys: ['SMH', 'AIQ', 'BOTZ'] },
    { name: '能源與核能', icon: '⚡', keys: ['URNM', 'NLR', 'CPER'] },
    { name: '避險資產',  icon: '🛡️', keys: ['GLD', 'BTC', 'ETH'] },
  ];
  const lookup = {};
  watchlist.forEach(w => { lookup[w.symbol.replace('-USD','')] = w; });

  const sigLookup = {};
  (signals || []).forEach(s => { sigLookup[s.symbol.replace('-USD','')] = s; });

  return sectors.map(sector => {
    const items = sector.keys.map(k => lookup[k]).filter(Boolean);
    return `
      <div class="heatmap-sector">
        <div class="heatmap-sector-title">${sector.icon} ${sector.name}</div>
        <div class="heatmap-blocks">
          ${items.map(w => {
            const pct  = w.change_pct || 0;
            const abs  = Math.min(Math.abs(pct) / 4, 1);
            const bg   = pct >= 0
              ? `rgba(16,185,129,${(0.08 + abs * 0.45).toFixed(2)})`
              : `rgba(239,68,68,${(0.08 + abs * 0.45).toFixed(2)})`;
            const border = pct >= 0
              ? `rgba(16,185,129,${(0.25 + abs * 0.5).toFixed(2)})`
              : `rgba(239,68,68,${(0.25 + abs * 0.5).toFixed(2)})`;
            const sym = w.symbol.replace('-USD','');
            const sig = sigLookup[sym] || {};
            const note = sig.note || (itemNotes || {})[sym] || '';
            // desc：括號內的中文說明（e.g. 鈾礦 ETF核能）
            const descMatch = (w.name || '').match(/（([^）]+)）/);
            const desc = descMatch ? descMatch[1] : (w.category || sector.name);
            return `
              <div class="heatmap-block"
                style="background:${bg};border-color:${border}"
                data-sym="${sym}"
                data-name="${w.name || sym}"
                data-desc="${desc.replace(/"/g,'&quot;')}"
                data-price="${w.price || ''}"
                data-pct="${pct}"
                data-vol="${w.volume_ratio || ''}"
                data-signal="${sig.signal_type || ''}"
                data-note="${note.replace(/"/g,'&quot;')}"
                data-cat="${w.category || sector.name}"
                onmouseenter="showHbTooltip(event,this)"
                onmousemove="moveHbTooltip(event)"
                onmouseleave="hideHbTooltip()">
                <div class="hb-symbol">${sym}</div>
                <div class="hb-pct ${pctClass(pct)}">${fmtPct(pct)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

/* 關鍵字對應表：symbol → 可能出現在新聞中的關鍵字 */
const SYM_KEYWORDS = {
  URNM: ['核能','uranium','鈾','URNM','nuclear','核電'],
  NLR:  ['核能','nuclear','NLR','核電'],
  CPER: ['銅','copper','CPER'],
  SMH:  ['半導體','semiconductor','晶片','chip','SMH','NVIDIA','AMD','英偉達'],
  AIQ:  ['AI','人工智慧','artificial intelligence','AIQ'],
  BOTZ: ['機器人','robotics','automation','BOTZ'],
  GLD:  ['黃金','gold','GLD','避險'],
  BTC:  ['Bitcoin','比特幣','BTC','加密','crypto'],
  ETH:  ['Ethereum','以太','ETH'],
  QQQ:  ['那斯達克','NASDAQ','科技股','QQQ'],
  SPY:  ['標普','S&P','SPY'],
  TLT:  ['國債','treasury','殖利率','TLT'],
};

function findRelatedNews(sym, cat) {
  const newsData = window._newsData;
  if (!newsData || !newsData.news) return [];
  const keywords = [
    ...(SYM_KEYWORDS[sym] || []),
    sym,
    ...(cat || '').split(/[\/，\s]+/).filter(k => k.length > 1),
  ];
  return newsData.news.filter(n => {
    const text = (n.title || '').toLowerCase();
    return keywords.some(k => text.includes(k.toLowerCase()));
  }).slice(0, 2);
}

function genAdviceText(sym, pct, volNum, sig, note, cat) {
  const absPct    = Math.abs(pct);
  const dir       = pct >= 0 ? '上漲' : '下跌';
  const pctStr    = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
  const magnitude = absPct >= 5 ? '大幅' : absPct >= 2 ? '明顯' : absPct >= 0.5 ? '小幅' : '微幅';
  const volText   = volNum >= 2.5 ? '極大量' : volNum >= 1.8 ? '大量放量' : volNum >= 1.3 ? '量能偏大'
                  : volNum >= 0.8 ? '量能正常' : volNum >= 0.5 ? '量縮' : '極度縮量';

  const lines = [];

  if (sig === 'buy') {
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}支撐`);
    if (volNum >= 1.5) lines.push('放量突破，動能偏強，可考慮順勢進場，注意追高風險');
    else if (volNum >= 1.0) lines.push('量價配合，趨勢向好，可分批布局或持倉待漲');
    else lines.push('量縮上漲，動能待確認，建議等待放量再加碼確認');
  } else if (sig === 'sell') {
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}`);
    if (volNum >= 1.5) lines.push('放量下跌，賣壓明顯，建議減碼降低曝險，嚴設停損');
    else lines.push('弱勢格局，量能有限但趨勢偏空，觀望為主，避免攤平');
  } else {
    // watch or unknown
    lines.push(`<strong>${magnitude}${dir} ${pctStr}</strong>，${volText}`);
    if (absPct < 0.5) lines.push('橫盤整理中，多空拉鋸，方向尚未明朗，靜待突破訊號');
    else if (pct < 0 && volNum < 0.9) lines.push('量縮回測，正常技術整理，支撐未破前維持觀察，不輕易追殺');
    else if (pct > 0 && volNum < 0.9) lines.push('量縮小漲，動能不足，上攻力道待確認，謹慎追高');
    else lines.push('留意關鍵技術位，等待方向確認後再行動');
  }

  if (note) lines.push(`<strong>分析師：</strong>${note}`);

  return lines.join('。<br>');
}

/* ── 浮窗用 inline SVG 走勢圖（直接用 cachedHistory 真實數據）── */
function buildSparkSVG(sym) {
  const hist = (cachedHistory[sym] || []).slice(-30);
  const prices = hist.map(h => h.price).filter(p => p != null && !isNaN(p));
  if (prices.length < 3) return '';

  const W = 268, H = 52;
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || Math.abs(min) * 0.02 || 1;
  const isUp  = prices[prices.length - 1] >= prices[0];
  const color = isUp ? '#10B981' : '#EF4444';
  const gradId = `hbg-${sym}`;

  const toX = i  => (2 + (i / (prices.length - 1)) * (W - 4)).toFixed(1);
  const toY = v  => (H - 4 - ((v - min) / range) * (H - 10) + 3).toFixed(1);

  const linePoints = prices.map((p, i) => `${toX(i)},${toY(p)}`).join(' ');
  const areaPath   =
    `M${toX(0)},${toY(prices[0])}` +
    prices.slice(1).map((p, i) => ` L${toX(i + 1)},${toY(p)}`).join('') +
    ` L${toX(prices.length - 1)},${H} L${toX(0)},${H} Z`;

  // Price range label
  const fmtP = v => v >= 1000 ? v.toLocaleString('en-US', {maximumFractionDigits: 0})
                               : v.toFixed(2);
  const rangeLabel = `$${fmtP(min)} – $${fmtP(max)}`;
  const days = hist.length;

  return { svg: `
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="${color}" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
        </linearGradient>
      </defs>
      <path  d="${areaPath}"   fill="url(#${gradId})"/>
      <polyline points="${linePoints}" fill="none" stroke="${color}"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  `, rangeLabel, days };
}

function showHbTooltip(e, el) {
  const t     = document.getElementById('hb-tooltip');
  const sym   = el.dataset.sym;
  const name  = el.dataset.name || sym;
  const desc  = el.dataset.desc || el.dataset.cat || '';
  const price = el.dataset.price ? parseFloat(el.dataset.price) : null;
  const pct   = parseFloat(el.dataset.pct) || 0;
  const volRaw= el.dataset.vol ? parseFloat(el.dataset.vol) : null;
  const sig   = el.dataset.signal || '';
  const note  = el.dataset.note  || '';
  const cat   = el.dataset.cat   || '';

  const priceStr = price !== null ? `$${price.toFixed(2)}` : 'N/A';
  const volStr   = volRaw !== null ? volRaw.toFixed(1) + 'x' : 'N/A';
  const volNum   = volRaw !== null ? volRaw : 1.0;
  const volHint  = volNum >= 1.5 ? '放量' : volNum >= 0.8 ? '正常' : '量縮';
  const pctClass = pct >= 0 ? 'up' : 'down';

  const sigCfg = {
    buy:   { cls: 'hbt-signal-buy',   icon: '📈', label: 'BUY — 建議買入' },
    sell:  { cls: 'hbt-signal-sell',  icon: '📉', label: 'SELL — 建議減碼' },
    watch: { cls: 'hbt-signal-watch', icon: '👀', label: 'WATCH — 持續觀察' },
  };
  const sc = sigCfg[sig] || { cls: 'hbt-signal-watch', icon: '—', label: '—' };

  const adviceText  = genAdviceText(sym, pct, volNum, sig, note, cat);
  const relatedNews = findRelatedNews(sym, cat);
  const sparkResult = buildSparkSVG(sym);

  const newsImpactLabel = { bearish: '空', bullish: '多', neutral: '中' };

  t.innerHTML = `
    <div class="hbt-top">
      <div class="hbt-header">
        <div>
          <div class="hbt-sym-line">
            <span class="hbt-sym">${sym}</span>
            ${sig ? `<span class="hbt-advice-badge ${sc.cls}">${sc.icon} ${sc.label}</span>` : ''}
          </div>
          <div class="hbt-name">${desc || name}</div>
        </div>
        <div class="hbt-right">
          <div class="hbt-price ${pctClass}">${priceStr}</div>
          <div class="hbt-pct-lg ${pctClass}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</div>
        </div>
      </div>
    </div>

    <div class="hbt-stats">
      <div class="hbt-stat">
        <div class="hbt-stat-label">成交量比</div>
        <div class="hbt-stat-val">${volStr}<small>${volHint}</small></div>
      </div>
      <div class="hbt-stat">
        <div class="hbt-stat-label">主題板塊</div>
        <div class="hbt-stat-val" style="font-family:'Inter',sans-serif;font-size:11px">${cat}</div>
      </div>
    </div>

    ${sparkResult ? `
    <div class="hbt-spark-wrap">
      <div class="hbt-spark-label">
        <span>近 ${sparkResult.days} 日走勢</span>
        <span class="hbt-spark-range">${sparkResult.rangeLabel}</span>
      </div>
      ${sparkResult.svg}
    </div>` : ''}

    <div class="hbt-advice">
      <div class="hbt-advice-label">📊 操作分析</div>
      <div class="hbt-advice-text">${adviceText}</div>
    </div>

    ${relatedNews.length > 0 ? `
    <div class="hbt-news">
      <div class="hbt-news-label">📰 相關新聞</div>
      ${relatedNews.map(n => `
        <div class="hbt-news-item">
          <span class="news-impact ${n.impact || 'neutral'}" style="flex-shrink:0;font-size:9px">${newsImpactLabel[n.impact] || '中'}</span>
          <span class="hbt-news-title">${n.title}</span>
        </div>
      `).join('')}
    </div>` : `
    <div class="hbt-news">
      <div class="hbt-no-news">暫無相關即時新聞</div>
    </div>`}
  `;

  moveHbTooltip(e);
  t.classList.add('visible');
}

function moveHbTooltip(e) {
  const t  = document.getElementById('hb-tooltip');
  const vw = window.innerWidth, vh = window.innerHeight;
  const th = t.offsetHeight || 300;
  let x = e.clientX + 18, y = e.clientY + 14;
  if (x + 360 > vw) x = e.clientX - 360 - 10;
  if (y + th  > vh) y = e.clientY - th - 10;
  if (x < 4) x = 4;
  if (y < 4) y = 4;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

function hideHbTooltip() {
  document.getElementById('hb-tooltip').classList.remove('visible');
}

/* ── 盤前掃描渲染 ── */
function renderPremarket(pm) {
  if (!pm || !pm.movers || !pm.movers.length) return '';
  const toneClass = pm.market_tone && pm.market_tone.includes('多') ? 'pm-tone-bull'
                  : pm.market_tone && pm.market_tone.includes('空') ? 'pm-tone-bear'
                  : 'pm-tone-neutral';
  const valid = pm.movers.filter(m => m.premarket_pct !== null && m.premarket_pct !== undefined && !m.error);
  if (!valid.length) return '';

  const moversHTML = valid.map(m => {
    const pct = m.premarket_pct;
    const cls = pct > 0.5 ? 'up' : pct < -0.5 ? 'down' : 'flat';
    const pctStr = (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
    return `
      <div class="pm-mover">
        <div class="pm-mover-sym">${m.symbol}</div>
        <div class="pm-mover-name" title="${m.name}">${m.name}</div>
        <div class="pm-mover-pct ${cls}">${pctStr}</div>
        ${m.premarket_time ? `<div style="font-size:9px;color:var(--text-muted)">${m.premarket_time}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="premarket-panel section-gap" id="premarket-panel">
      <div class="premarket-header">
        <h2 style="font-size:14px">盤前掃描</h2>
        <span class="pm-tone-badge ${toneClass}">${pm.market_tone || '—'}</span>
        ${pm.summary ? `<span style="font-size:11px;color:var(--text-muted)">多${pm.summary.bullish} 空${pm.summary.bearish} 中${pm.summary.neutral}</span>` : ''}
        <span style="font-size:10px;color:var(--text-muted);margin-left:auto">📡 ${pm.fetched_at || ''}</span>
      </div>
      <div class="pm-grid">${moversHTML}</div>
    </div>`;
}

/* ── 即時新聞渲染 ── */
function renderNewsFlash(newsData) {
  if (!newsData || !newsData.news || !newsData.news.length) return '';
  const impactLabel = { bearish: '空', bullish: '多', neutral: '中' };
  const catColor = { Fed:'#f59e0b', Earnings:'#38bdf8', Macro:'#a78bfa', Geo:'#ef4444', Flows:'#10b981' };
  const mode = newsData.mode || 'intraday';
  const isPreopen = mode === 'preopen';

  // 盤前專屬區塊
  let preopenBlock = '';
  if (isPreopen) {
    const fut = newsData.futures || {};
    const outlook = newsData.open_outlook || '';
    const drivers = (newsData.key_drivers || []).map(d => `<li>${d}</li>`).join('');
    const lvl = newsData.watch_levels || {};
    preopenBlock = `
      <div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:10px 12px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:6px">🌅 盤前快訊</div>
        ${fut.es_change||fut.nq_change ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:4px">
          期貨：S&P ${fut.es_change||'—'} &nbsp;|&nbsp; Nasdaq ${fut.nq_change||'—'} &nbsp;|&nbsp; VIX ${fut.vix||'—'}
        </div>` : ''}
        ${outlook ? `<div style="font-size:11px;color:#cbd5e1;line-height:1.5;margin-bottom:4px">📐 ${outlook}</div>` : ''}
        ${drivers ? `<ul style="font-size:11px;color:#94a3b8;margin:4px 0 0 16px;padding:0">${drivers}</ul>` : ''}
        ${lvl.spx_support ? `<div style="font-size:10px;color:#64748b;margin-top:4px">SPX 支撐：${lvl.spx_support.join(' / ')} &nbsp; 壓力：${(lvl.spx_resist||[]).join(' / ')}</div>` : ''}
      </div>`;
  }

  // 宏觀快照（盤中模式）
  let macroBlock = '';
  const snap = newsData.macro_snapshot;
  if (!isPreopen && snap) {
    const sr = newsData.sector_rotation || {};
    macroBlock = `
      <div style="background:rgba(148,163,184,0.05);border:1px solid rgba(148,163,184,0.15);border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:10px;color:#94a3b8;line-height:1.8">
        <span style="color:#f59e0b;font-weight:700">Fed</span> ${snap.fed_stance||'—'} &nbsp;
        <span style="color:#60a5fa">10Y</span> ${snap.yield_10y||'—'} &nbsp;
        <span style="color:#a78bfa">DXY</span> ${snap.dxy||'—'} &nbsp;
        <span style="color:#fb923c">WTI</span> ${snap.oil_wti||'—'} &nbsp;
        <span style="color:#f87171">VIX</span> ${snap.vix||'—'}
        ${sr.strong ? `<br>強勢：<span style="color:#10b981">${(sr.strong||[]).join('、')}</span> &nbsp; 弱勢：<span style="color:#ef4444">${(sr.weak||[]).join('、')}</span>` : ''}
      </div>`;
  }

  const items = newsData.news.map(n => {
    const cat = n.category || '';
    const catBadge = cat ? `<span style="font-size:9px;padding:1px 4px;border-radius:3px;background:${catColor[cat]||'#374151'}22;color:${catColor[cat]||'#94a3b8'};border:1px solid ${catColor[cat]||'#374151'}44;margin-left:4px">${cat}</span>` : '';
    return `
    <div class="news-item">
      <span class="news-impact ${n.impact || 'neutral'}">${impactLabel[n.impact] || '中'}</span>
      <div>
        <div class="news-title">${n.title}${catBadge}</div>
        <div class="news-source">${n.source || ''}</div>
      </div>
    </div>`;
  }).join('');

  const updated = newsData.fetched_at || newsData.date || '';
  const modeLabel = isPreopen ? '盤前情報' : '即時新聞';
  return `
    <div class="news-flash" id="news-flash-container">
      <div class="news-flash-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>${modeLabel}</span>
        <span style="font-size:9px;color:#475569;font-weight:400" id="news-refresh-status">每10分鐘自動更新</span>
      </div>
      ${preopenBlock}
      ${macroBlock}
      ${items}
      ${updated ? `<div class="news-updated">更新時間：${updated}</div>` : ''}
    </div>
  `;
}

/* ── 宏觀指標列 ── */
function renderMacroStrip(macro) {
  if (!macro || !macro.length) return '';

  // DXY > 105 強勢；US10Y > 4.5% 高壓；VIX > 20 恐慌
  const hints = {
    'DXY':   v => v > 105 ? '強美元' : v < 100 ? '弱美元' : '中性',
    'US10Y': v => v > 4.5 ? '高壓估值' : v < 3.5 ? '寬鬆' : '中性',
    'VIX':   v => v > 25 ? '🔴恐慌' : v > 20 ? '🟡警戒' : '🟢平靜',
  };

  const items = macro.map(m => {
    const val  = m.price !== null ? m.price.toFixed(2) : 'N/A';
    const hint = hints[m.name] ? hints[m.name](m.price || 0) : '';
    return `
      <div class="macro-item" title="${m.desc || m.name}">
        <span class="m-name">${m.name}</span>
        <span class="m-val">${val}</span>
        <span class="m-chg ${pctClass(m.change_pct)}">${fmtPct(m.change_pct)}</span>
        ${hint ? `<span class="m-desc">${hint}</span>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="macro-strip section-gap">
      <span class="macro-label">宏觀</span>
      ${items}
    </div>
  `;
}

function renderText(text) {
  if (!text || text.includes('失敗')) return '<span style="color:var(--text-muted)">（暫無資料）</span>';
  return `<div class="text-block">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
}

/* ── 解析 risk_line 取得數字評分 ── */
function parseRiskScore(riskLine) {
  if (!riskLine) return null;
  const m = riskLine.match(/score=(\d+)/i);
  return m ? parseInt(m[1]) : null;
}

/* ── 整體風險面板（含評分說明）── */

  const signals = data.watchlist || [];
  const greens  = signals.filter(w => w.signal === '🟢').length;
  const yellows = signals.filter(w => w.signal === '🟡').length;
  const reds    = signals.filter(w => w.signal === '🔴').length;
  const score   = parseRiskScore(data.risk_line);
  const scoreStr = score !== null ? `${score}/10` : '—';

  return `
    <div class="risk-panel">
      <div class="risk-top">
        <span class="risk-label">整體風險評分</span>
        ${riskBadge(data.risk_line)}
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)">
          ${scoreStr}
        </span>
        <span class="date">${data.date}</span>
      </div>
      <div class="risk-bottom">
        <div class="risk-signals">
          <span class="sig-count green"><span class="signal green" style="margin:0"></span>${greens}</span>
          <span class="sig-count yellow"><span class="signal yellow" style="margin:0"></span>${yellows}</span>
          <span class="sig-count red"><span class="signal red" style="margin:0"></span>${reds}</span>
        </div>
        <div class="risk-explain">
          <strong>評分說明</strong>：綜合掃描 SPX/NQ 趨勢、VIX 波動率、WTI 油價、
          各板塊信號強弱、多空資金分歧，每項最高 2 分，滿分 8 分。
          分數越高代表當前市場承壓越大、尾部風險越集中。
          <div class="risk-thresholds">
            <span class="risk-thr green">🟢 0–3　市場健康，可積極持倉</span>
            <span class="risk-thr yellow">🟡 4–5　注意波動，控管部位規模</span>
            <span class="risk-thr red">🔴 6–8　高風險，建議降低整體曝險</span>
          </div>
        </div>
      </div>
      ${(data.risk_factors && data.risk_factors.length > 0) ? `
      <div class="risk-factors-section">
        <div class="risk-factors-title">風險因子明細（J段掃描）</div>
        <table class="risk-factors-table">
          <thead><tr><th>段落</th><th>本輪狀況</th><th>分數</th></tr></thead>
          <tbody>
            ${data.risk_factors.map(f => {
              const scoreNum = parseInt((f.score || '').replace(/\D/g,'')) || 0;
              const rowClass = scoreNum >= 2 ? 'row-red' : scoreNum >= 1 ? 'row-yellow' : 'row-green';
              return `<tr class="${rowClass}"><td>${f.segment}</td><td>${f.status || f.indicator || ''}</td><td>${f.score}</td></tr>`;

             style="width:100%;max-width:600px;display:block;margin:8px auto 0;border-radius:8px;background:#0b0f19"
             onerror="this.style.display='none'"/>

    </div>

}

/* ── 今日總結卡片 ── */
function renderDailySummary(data) {
  const watchlist = data.watchlist || [];
  const indices   = data.indices   || [];

  // 市場偏向
  const avgIdx = indices.length
    ? indices.reduce((s, i) => s + (i.change_pct || 0), 0) / indices.length
    : 0;
  const biasLabel = avgIdx >= 0.8 ? '多頭偏強' : avgIdx >= 0.2 ? '小幅收漲'
                  : avgIdx >= -0.2 ? '震盪整理'  : avgIdx >= -0.8 ? '小幅收跌' : '空頭偏弱';
  const biasClass = avgIdx >= 0.2 ? 'up' : avgIdx <= -0.2 ? 'down' : 'flat';

  // 最強 / 最弱標的
  const sorted = [...watchlist].filter(w => w.change_pct !== null)
    .sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));
  const best  = sorted[0];
  const worst = sorted[sorted.length - 1];

  // 信號分布
  const greens  = watchlist.filter(w => w.signal === '🟢').length;
  const reds    = watchlist.filter(w => w.signal === '🔴').length;
  const sigText = greens > reds ? `${greens} 強 / ${reds} 弱` : `${reds} 弱 / ${greens} 強`;

  // AI 操作方向（取 📌 整體策略 那行）
  const advice = data.advice || '';
  const strategyLine = advice.split('\n').find(l => l.includes('📌')) || '';
  const strategyText = strategyLine.replace('📌', '').replace('整體策略：', '').trim()
    || advice.split('\n').find(l => l.trim().length > 10) || '（暫無建議）';

  const bestSym  = best  ? best.symbol.replace('-USD','')  : '—';
  const worstSym = worst ? worst.symbol.replace('-USD','') : '—';

  // 風險燈號整合
  const riskScore = parseRiskScore(data.risk_line);
  const riskHint  = riskScore !== null
    ? (riskScore >= 6 ? '高風險 — 建議降低整體曝險'
     : riskScore >= 4 ? '注意波動 — 控管部位規模'
     : '市場健康 — 可積極持倉')
    : '';

  return `
    <div class="summary-card section-gap">
      <h2>今日總結</h2>
      ${data.risk_line ? `
      <div class="summary-risk-bar">
        ${riskBadge(data.risk_line)}
        ${riskHint ? `<span class="summary-risk-hint">${riskHint}</span>` : ''}
        ${riskScore !== null ? `<span class="summary-risk-score">${riskScore}/8</span>` : ''}
      </div>` : ''}
      <div class="summary-stats">
        <div class="stat-block">
          <div class="stat-label">市場偏向</div>
          <div class="stat-value ${biasClass}">${biasLabel}</div>
          <div class="stat-sub">指數均漲跌 ${avgIdx >= 0 ? '+' : ''}${avgIdx.toFixed(2)}%</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最強標的</div>
          <div class="stat-value up">${bestSym}</div>
          <div class="stat-sub">${best ? fmtPct(best.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最弱標的</div>
          <div class="stat-value down">${worstSym}</div>
          <div class="stat-sub">${worst ? fmtPct(worst.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">信號分布</div>
          <div class="stat-value ${greens > reds ? 'up' : reds > greens ? 'down' : 'flat'}">${sigText}</div>
          <div class="stat-sub">共 ${watchlist.length} 個追蹤標的</div>
        </div>
      </div>
      <div class="summary-advice">
        <div class="advice-label">📌 操作方向</div>
        ${strategyText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </div>
      ${data.prev_review ? `
      <div class="summary-advice" style="margin-top:10px;border-left-color:var(--text-muted)">
        <div class="advice-label" style="color:var(--text-muted)">🔍 前日建議檢討</div>
        ${data.prev_review.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </div>` : ''}
    </div>
  `;
}

/* ── 圖表初始化（DOM ready 後呼叫）── */
function initCharts(data, history = {}) {
  const date = data.date || '';

  // A区：情緒儀表（CNN 真實數據）
  initGauge(calcSentimentScore(data), data);
  // 來源標注
  const fgEl = document.getElementById('gauge-source');
  if (fgEl) {
    const fg = data.fear_greed;
    if (fg && fg.score !== null) {
      const wk = fg.week_change;
      const wkStr = wk !== null && wk !== undefined
        ? ` / 近一週 ${wk >= 0 ? '+' : ''}${wk.toFixed(1)}`
        : '';
      fgEl.textContent = `CNN Fear & Greed${wkStr}`;
    } else {
      fgEl.textContent = '信號推算（CNN 暫不可用）';
    }
  }

  // 指數 sparklines
  (data.indices || []).forEach((idx, i) => {
    const key  = idx.symbol.replace('-USD', '');
    const hist = history[key] || [];
    const pts  = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(idx.change_pct, idx.name, date);
    const isUp = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (idx.change_pct || 0) >= 0;
    initSparkline(`idx-spark-${i}`, pts, isUp);
  });

  // B区：watchlist sparklines
  (data.watchlist || []).forEach(w => {
    const sym    = w.symbol.replace('-USD', '');
    const safeId = 'spark-' + sym.replace(/[^a-zA-Z0-9]/g, '_');
    const hist   = history[sym] || [];
    const pts    = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(w.change_pct, sym, date);
    const isUp   = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (w.change_pct || 0) >= 0;
    initSparkline(safeId, pts, isUp);
  });
}

/* ── 台股均線操盤框架面板 ── */
function renderTWMAPanel(twMa) {
  if (!twMa || !twMa.taiex) return '';

  const t   = twMa.taiex;
  const abc = t.abc_signal || {};
  const arr = t.arrangement || 'ranging';
  const pos = abc.position_pct ?? '—';

  const arrBadgeClass = {
    bull:    'tw-arr-bull',
    bear:    'tw-arr-bear',
    squeeze: 'tw-arr-squeeze',
    ranging: 'tw-arr-ranging',
  }[arr] || 'tw-arr-ranging';

  const fmtMa = (v, p) => {
    if (v == null) return '<span class="tw-ma-val" style="color:var(--text-muted)">N/A</span>';
    const cls = p > 0 ? 'up' : p < 0 ? 'down' : 'flat';
    const pctStr = p != null ? `(${p >= 0 ? '+' : ''}${p.toFixed(1)}%)` : '';
    return `<span class="tw-ma-val">${Math.round(v).toLocaleString()}</span>
            <span class="tw-ma-pct ${cls}">${pctStr}</span>`;
  };

  // 佈局候選
  const candidates = (twMa.layout_candidates || []).slice(0, 6);
  const candidateRows = candidates.map(c => {
    const p = c.pct_ma120;
    const pctCls = p < 0 ? 'down' : 'up';
    const pctStr = p != null ? `${p >= 0 ? '+' : ''}${p.toFixed(1)}%` : 'N/A';
    const sym = (c.symbol || '').replace('.TW', '').replace('.TWO', '');
    return `
      <div class="tw-candidate-row">
        <div style="display:flex;gap:8px;align-items:center">
          <span class="tw-cand-sym">${sym}</span>
          <span class="tw-cand-name">${c.name || ''}</span>
        </div>
        <span class="tw-cand-pct ${pctCls}">半年線 ${pctStr}</span>
      </div>`;
  }).join('');

  const sm = twMa.summary || {};

  return `
    <div class="tw-panel section-gap">
      <div class="tw-panel-left">
        <h2>🇹🇼 台股操盤框架（ABC 均線系統）</h2>
        <div class="tw-taiex-row">
          <div class="tw-taiex-price">${t.price ? Math.round(t.price).toLocaleString() : '—'}</div>
          <span class="tw-arr-badge ${arrBadgeClass}">${t.arrangement_label || arr}</span>
        </div>
        <div class="tw-ma-row">
          <div class="tw-ma-item">
            <span class="tw-ma-label">月線（20）</span>
            ${fmtMa(t.ma20, t.pct_ma20)}
          </div>
          <div class="tw-ma-item">
            <span class="tw-ma-label">季線（60）</span>
            ${fmtMa(t.ma60, t.pct_ma60)}
          </div>
          <div class="tw-ma-item">
            <span class="tw-ma-label">半年線（120）</span>
            ${fmtMa(t.ma120, t.pct_ma120)}
          </div>
        </div>
        <div class="tw-abc-block">
          <div class="tw-abc-pos">📌 建議持倉：${pos}%</div>
          <div class="tw-abc-desc">${abc.description || '—'}</div>
        </div>
        ${sm.total_scanned ? `
        <div class="tw-summary">
          <div class="tw-sum-item">掃描 <span class="tw-sum-val">${sm.total_scanned}</span> 檔</div>
          <div class="tw-sum-item" style="color:#10B981">多頭 <span class="tw-sum-val" style="color:#10B981">${sm.bull_count || 0}</span></div>
          <div class="tw-sum-item" style="color:#F59E0B">整理 <span class="tw-sum-val" style="color:#F59E0B">${sm.ranging_count || 0}</span></div>
          <div class="tw-sum-item" style="color:#EF4444">空頭 <span class="tw-sum-val" style="color:#EF4444">${sm.bear_count || 0}</span></div>
        </div>` : ''}
      </div>
      <div class="tw-panel-right">
        <h2>🎯 半年線佈局候選</h2>
        <div class="tw-candidates">
          ${candidates.length
            ? candidateRows
            : '<div class="tw-empty">暫無符合條件的佈局候選<br><span style="font-size:11px">（條件：整理型態 + 半年線 -8%~+5%）</span></div>'
          }
        </div>
      </div>
    </div>
  `;
}

  });
}

async function main() {
  try {
    const latest = await fetchJSON('reports/latest.json');

    // 初始化日期列表
    allDates   = latest.all_dates || [latest.latest_date];
    currentIdx = allDates.length - 1;

    const data = await fetchJSON(`reports/${allDates[currentIdx]}.json`);

    // 並行抓取歷史數據 + 新聞
    const allSymbols = [
      ...(data.indices   || []).map(i => i.symbol),
      ...(data.watchlist || []).map(w => w.symbol),
    ];
    const [, newsResult, premktResult] = await Promise.allSettled([
      Promise.allSettled(
        [...new Set(allSymbols)].map(async sym => {
          const key = sym.replace('-USD', '');
          try { cachedHistory[key] = await fetchJSON(`reports/history/${key}.json`); }
          catch { cachedHistory[key] = []; }
        })
      ),
      fetchJSON('news-feed.json').catch(() => null),
      fetchJSON('premarket.json').catch(() => null),
    ]);

    window._newsData = newsResult.status === 'fulfilled' ? newsResult.value : null;
    window._premkt   = premktResult.status === 'fulfilled' ? premktResult.value : null;

    renderDateNavUI();
    render(data, cachedHistory);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 載入失敗：${e.message}<br><small>請稍後再試</small></div>`;
  }
}

main();

// ── 新聞 Auto-Refresh（每10分鐘，只更新新聞區塊）──────────────
async function refreshNews() {
  try {
    const nd = await fetchJSON('news-feed.json');
    if (!nd || !nd.news) return;
    window._newsData = nd;
    // 只重繪新聞區塊，不重跑整個 render
    const container = document.getElementById('news-flash-container');
    if (container) {
      const parent = container.parentElement;
      const temp = document.createElement('div');
      temp.innerHTML = renderNewsFlash(nd);
      const newNode = temp.firstElementChild;
      if (newNode) parent.replaceChild(newNode, container);
    }
    const statusEl = document.getElementById('news-refresh-status');
    if (statusEl) {
      const now = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
      statusEl.textContent = `已更新 ${now}`;
    }
  } catch (e) { /* 靜默失敗，不影響主頁面 */ }
}
// 每10分鐘刷新一次新聞（600000ms）
setInterval(refreshNews, 600000);

// ── 盤前資料 Auto-Refresh（每5分鐘）──────────────────────────────
async function refreshPremarket() {
  try {
    const pm = await fetchJSON('premarket.json');
    if (!pm || !pm.movers) return;
    window._premkt = pm;
    const existing = document.getElementById('premarket-panel');
    if (existing) {
      const temp = document.createElement('div');
      temp.innerHTML = renderPremarket(pm);
      const newNode = temp.firstElementChild;
      if (newNode) existing.replaceWith(newNode);
    }
  } catch (e) { /* 靜默失敗 */ }
}
setInterval(refreshPremarket, 300000);
