<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Intel — 每日美股市場情報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.49.2/dist/apexcharts.min.js"></script>
  <style>
    :root {
      --bg-dark:    #0B0F19;
      --card-bg:    #1A2235;
      --card-bg2:   #1E2840;
      --border:     #2A354D;
      --border-ai:  #6366F1;
      --text-main:  #FFFFFF;
      --text-muted: #94A3B8;
      --color-up:   #10B981;
      --color-down: #EF4444;
      --color-ai:   #6366F1;
      --color-warn: #F59E0B;
      --color-blue: #38BDF8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: rgba(26, 34, 53, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366F1, #38BDF8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .market-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .market-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-up);
      box-shadow: 0 0 6px var(--color-up);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-meta { color: var(--text-muted); font-size: 12px; }

    /* ── Layout ── */
    .container { max-width: 1080px; margin: 0 auto; padding: 28px 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-gauge { display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: stretch; }
    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .grid-gauge { grid-template-columns: 1fr; }
    }
    .section-gap { margin-top: 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Base Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: var(--color-ai);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.12);
    }
    .card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── A区：情緒儀表板 ── */
    .gauge-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color 0.2s;
    }
    .gauge-card:hover { border-color: var(--color-ai); }
    .gauge-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0;
      align-self: flex-start;
    }
    #sentiment-gauge { width: 100%; }
    .gauge-legend {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 10px;
      color: var(--text-muted);
      padding: 0 8px;
      margin-top: 4px;
    }

    /* ── AI Hero Card ── */
    .ai-hero {
      background: linear-gradient(135deg, #1A2235, #141929);
      border: 1px solid var(--border-ai);
      border-radius: 14px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .ai-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .ai-hero-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-ai);
      margin-bottom: 12px;
    }
    .ai-hero-label .ai-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--color-ai);
      box-shadow: 0 0 8px var(--color-ai);
    }
    .ai-summary-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* ── 指數卡片 ── */
    .index-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 18px 8px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .index-card:hover { transform: translateY(-2px); border-color: var(--color-ai); }
    .index-card .name { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.05em; }
    .index-card .price {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .index-card .change {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }
    .index-card .index-spark { margin-top: 6px; height: 40px; }
    .up   { color: var(--color-up); }
    .down { color: var(--color-down); }
    .flat { color: var(--text-muted); }

    /* ── 風險面板 ── */
    .risk-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 20px;
    }
    .risk-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .risk-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-green  { background: rgba(16,185,129,0.12); color: var(--color-up);   border: 1px solid rgba(16,185,129,0.4);  box-shadow: 0 0 12px rgba(16,185,129,0.15); }
    .risk-yellow { background: rgba(245,158,11,0.12); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.4);  box-shadow: 0 0 12px rgba(245,158,11,0.15); }
    .risk-red    { background: rgba(239,68,68,0.12);  color: var(--color-down); border: 1px solid rgba(239,68,68,0.4);   box-shadow: 0 0 12px rgba(239,68,68,0.15); }
    .risk-top .date { margin-left: auto; color: var(--text-muted); font-size: 12px; }
    /* 信號分布列 */
    .risk-bottom {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 640px) { .risk-bottom { grid-template-columns: 1fr; } }
    .risk-signals {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .sig-count {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--card-bg2);
    }
    .sig-count.green  { color: var(--color-up); }
    .sig-count.yellow { color: var(--color-warn); }
    .sig-count.red    { color: var(--color-down); }
    /* 評分說明 */
    .risk-explain {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      border-left: 2px solid var(--border);
      padding-left: 14px;
    }
    .risk-explain strong { color: var(--text-main); font-weight: 600; }
    .risk-thresholds {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .risk-thr {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .risk-thr.green  { background: rgba(16,185,129,0.1); color: var(--color-up); }
    .risk-thr.yellow { background: rgba(245,158,11,0.1); color: var(--color-warn); }
    .risk-thr.red    { background: rgba(239,68,68,0.1);  color: var(--color-down); }

    /* ── 風險因子明細 ── */
    .risk-factors-section {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }
    .risk-factors-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .risk-factors-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .risk-factors-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
    }
    .risk-factors-table td {
      padding: 6px 10px;
      border-bottom: 1px solid rgba(42,53,77,0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .risk-factors-table tr.row-green td { color: var(--color-up); }
    .risk-factors-table tr.row-yellow td { color: var(--color-warn); }
    .risk-factors-table tr.row-red td { color: var(--color-down); }
    .risk-factors-table tr.row-green { background: rgba(16,185,129,0.03); }
    .risk-factors-table tr.row-yellow { background: rgba(245,158,11,0.05); }
    .risk-factors-table tr.row-red { background: rgba(239,68,68,0.06); }

    /* ── 宏觀指標列 ── */
    .macro-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      align-items: center;
    }
    .macro-strip .macro-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .macro-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .macro-item .m-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .macro-item .m-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
    }
    .macro-item .m-chg {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    .macro-item .m-desc {
      font-size: 10px;
      color: var(--text-muted);
      border-left: 1px solid var(--border);
      padding-left: 8px;
    }
    /* 量能徽章 */
    .vol-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 3px;
    }
    .vol-spike  { background: rgba(245,158,11,0.15); color: var(--color-warn); border: 1px solid rgba(245,158,11,0.35); }
    .vol-normal { background: rgba(148,163,184,0.08); color: var(--text-muted); border: 1px solid var(--border); }
    /* buy / watch / sell badges */
    .action-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      cursor: default;
    }
    .sig-buy   { background: rgba(16,185,129,0.18); color: #10B981; border: 1px solid rgba(16,185,129,0.4); }
    .sig-watch { background: rgba(56,189,248,0.12); color: #38BDF8; border: 1px solid rgba(56,189,248,0.35); }
    .sig-sell  { background: rgba(239,68,68,0.15);  color: #EF4444; border: 1px solid rgba(239,68,68,0.4); }

    /* ── 今日總結 ── */
    .summary-card {
      background: var(--card-bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .summary-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 640px) { .summary-stats { grid-template-columns: repeat(2, 1fr); } }
    .stat-block {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .stat-block .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-block .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
    }
    .stat-block .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .summary-advice {
      font-size: 13px;
      color: var(--text-main);
      line-height: 1.7;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--color-ai);
      border-radius: 8px;
    }
    .summary-advice .advice-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-ai);
      margin-bottom: 6px;
    }

    /* ── 信號燈點 ── */
    .signal { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }
    .signal.green  { background: var(--color-up);   box-shadow: 0 0 6px var(--color-up); }
    .signal.yellow { background: var(--color-warn); box-shadow: 0 0 6px var(--color-warn); }
    .signal.red    { background: var(--color-down); box-shadow: 0 0 6px var(--color-down); }
    .signal.gray   { background: var(--text-muted); }

    /* ── C区：板塊熱力圖 ── */
    .heatmap-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 768px) {
      .heatmap-wrap { grid-template-columns: 1fr; }
    }
    .heatmap-sector {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .heatmap-sector-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .heatmap-blocks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .heatmap-block {
      border-radius: 8px;
      border: 1px solid transparent;
      padding: 10px 6px;
      text-align: center;
      cursor: default;
      transition: transform 0.15s, filter 0.15s;
    }
    .heatmap-block:hover { transform: scale(1.04); filter: brightness(1.2); }
    .hb-symbol {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text-main);
      margin-bottom: 3px;
    }
    .hb-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── B区：追蹤標的 + Sparklines ── */
    .watchlist-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .watchlist-item:last-child { border-bottom: none; }
    .watchlist-item .wi-left   { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .watchlist-item .wi-spark  { width: 72px; flex-shrink: 0; height: 36px; }
    .watchlist-item .wi-right  { text-align: right; flex-shrink: 0; }
    .watchlist-item .symbol { font-weight: 700; font-size: 13px; letter-spacing: 0.03em; white-space: nowrap; }
    .watchlist-item .desc  { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .watchlist-item .price-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
    }
    .watchlist-item .pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(99,102,241,0.12);
      color: var(--color-ai);
      border: 1px solid rgba(99,102,241,0.2);
      margin-left: 4px;
    }

    /* ── 文字段落 ── */
    .text-block {
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.85;
      color: var(--text-muted);
    }

    /* ── CTA ── */
    .cta-bar {
      background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(56,189,248,0.05));
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      margin-top: 24px;
    }
    .cta-bar h3 { color: var(--color-ai); font-size: 16px; margin-bottom: 8px; }
    .cta-bar p  { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--color-ai), #4F46E5);
      color: #fff;
      padding: 10px 26px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
      transition: box-shadow 0.2s;
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.5); }

    /* ── 日期導航列 ── */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 0 20px;
    }
    .date-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }
    .date-btn:hover:not(:disabled) { border-color: var(--color-ai); color: var(--text-main); }
    .date-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .date-current {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      min-width: 110px;
      text-align: center;
    }
    .date-badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(99,102,241,0.15);
      color: var(--color-ai);
      border: 1px solid rgba(99,102,241,0.3);
      margin-left: 6px;
      font-family: 'Inter', sans-serif;
      vertical-align: middle;
    }

    /* ── D区：30天趨勢折線圖 ── */
    .trend-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 20px 12px;
      transition: border-color 0.2s;
    }
    .trend-card:hover { border-color: var(--color-ai); }
    .trend-card h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .trend-placeholder {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 15px; }
    .error   { text-align: center; padding: 60px; color: var(--color-down); }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 32px 0 20px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📊 Market Intel</h1>
    <div class="market-status" id="market-status">
      <span class="dot"></span>
      <span id="market-status-text">載入中</span>
    </div>
  </div>
  <div class="header-meta" id="report-meta">—</div>
</header>

<div class="container">
  <div id="date-nav"></div>
  <div id="app">
    <div class="loading">⏳ 載入市場數據中...</div>
  </div>
</div>

<script>
const GITHUB_USER = 'Rostov12';
const GITHUB_REPO = 'market-intel';
const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

/* ── 全域狀態 ── */
let allDates      = [];
let currentIdx    = 0;
let cachedHistory = {};

/* ── 日期導航 UI ── */
function renderDateNavUI() {
  const nav = document.getElementById('date-nav');
  if (!nav || !allDates.length) return;
  const isLatest = currentIdx === allDates.length - 1;
  const isFirst  = currentIdx === 0;
  const date = allDates[currentIdx];
  nav.innerHTML = `
    <div class="date-nav">
      <button class="date-btn" onclick="loadDate(${currentIdx - 1})" ${isFirst ? 'disabled' : ''}>‹ 前一日</button>
      <span class="date-current">${date}${isLatest ? '<span class="date-badge">最新</span>' : ''}</span>
      <button class="date-btn" onclick="loadDate(${currentIdx + 1})" ${isLatest ? 'disabled' : ''}>後一日 ›</button>
    </div>
  `;
}

async function loadDate(idx) {
  if (idx < 0 || idx >= allDates.length) return;
  currentIdx = idx;
  renderDateNavUI();
  document.getElementById('app').innerHTML = '<div class="loading">⏳ 載入中...</div>';
  try {
    const data = await fetchJSON(`reports/${allDates[idx]}.json`);
    render(data, cachedHistory);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 載入失敗：${e.message}</div>`;
  }
}

/* ── D区：30天趨勢折線圖 ── */
function initTrendChart(history) {
  const el = document.querySelector('#trend-chart');
  if (!el || typeof ApexCharts === 'undefined') return;

  const SYMBOLS = [
    { key: 'SMH', name: '半導體 SMH', color: '#6366F1' },
    { key: 'GLD', name: '黃金 GLD',   color: '#F59E0B' },
    { key: 'BTC', name: 'Bitcoin',    color: '#F97316' },
  ];

  const series = [];
  let categories = [];

  SYMBOLS.forEach(s => {
    const hist = (history[s.key] || []).slice(-30);
    if (hist.length < 3) return;
    if (!categories.length) categories = hist.map(h => h.date);
    const first = hist[0].price || 1;
    series.push({
      name:  s.name,
      color: s.color,
      data:  hist.map(h => +((h.price - first) / first * 100).toFixed(2)),
    });
  });

  if (!series.length) {
    el.innerHTML = '<div class="trend-placeholder">📊 歷史數據累積中，5個交易日後啟用</div>';
    return;
  }

  new ApexCharts(el, {
    series,
    chart: {
      type: 'line', height: 220, background: 'transparent',
      toolbar: { show: false }, zoom: { enabled: false },
      animations: { enabled: false },
    },
    stroke: { curve: 'smooth', width: 2 },
    xaxis: {
      categories,
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'Inter' },
        formatter: v => v ? v.slice(5) : '',
      },
      tickAmount: 6, axisBorder: { show: false }, axisTicks: { show: false },
    },
    yaxis: {
      labels: {
        style: { colors: '#94A3B8', fontSize: '10px', fontFamily: 'JetBrains Mono' },
        formatter: v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%',
      },
    },
    grid: { borderColor: '#2A354D', strokeDashArray: 3 },
    legend: { labels: { colors: '#94A3B8' }, fontSize: '12px', fontFamily: 'Inter' },
    tooltip: {
      theme: 'dark',
      y: { formatter: v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%' },
      x: { show: true },
    },
    theme: { mode: 'dark' },
  }).render();
}

async function fetchJSON(path) {
  const res = await fetch(`${RAW_BASE}/${path}?_=${Date.now()}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function pctClass(pct) {
  if (pct === null || pct === undefined) return 'flat';
  return pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';
}

function fmtPct(pct) {
  if (pct === null || pct === undefined) return 'N/A';
  const sign = pct >= 0 ? '+' : '';
  return `${sign}${pct.toFixed(2)}%`;
}

function fmtPrice(price) {
  if (price === null || price === undefined) return 'N/A';
  return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function signalDot(sig) {
  if (sig === '🟢') return '<span class="signal green"></span>';
  if (sig === '🟡') return '<span class="signal yellow"></span>';
  if (sig === '🔴') return '<span class="signal red"></span>';
  return '<span class="signal gray"></span>';
}

function riskBadge(riskLine) {
  if (!riskLine) return '<span class="risk-badge risk-green">🟢 綠燈 — 正常</span>';
  const cls = riskLine.includes('紅') ? 'risk-red'
            : riskLine.includes('黃') ? 'risk-yellow'
            : 'risk-green';
  const icon = riskLine.includes('紅') ? '🔴' : riskLine.includes('黃') ? '🟡' : '🟢';
  return `<span class="risk-badge ${cls}">${icon} ${riskLine}</span>`;
}

function updateMarketStatus() {
  const now = new Date();
  const hour = now.getUTCHours();
  const min  = now.getUTCMinutes();
  const weekday = now.getUTCDay();
  const statusEl = document.getElementById('market-status-text');
  const dotEl    = document.querySelector('.market-status .dot');
  if (!statusEl || !dotEl) return;
  const isWeekday = weekday >= 1 && weekday <= 5;
  const totalMin  = hour * 60 + min;
  const isOpen    = isWeekday && totalMin >= 810 && totalMin < 1200; // 13:30–20:00 UTC
  if (isOpen) {
    statusEl.textContent = '🟢 Market Open';
    dotEl.style.background = '#10B981';
    dotEl.style.boxShadow  = '0 0 6px #10B981';
    dotEl.style.animation  = '';
  } else {
    statusEl.textContent = '⚫ Market Closed';
    dotEl.style.background = '#94A3B8';
    dotEl.style.boxShadow  = 'none';
    dotEl.style.animation  = 'none';
  }
}

/* ── 可重現的偽亂數（seed = symbol + date）── */
function seededRNG(seed) {
  let s = seed.split('').reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  return () => {
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    s = Math.imul(s ^ (s >>> 16), 0x45d9f3b);
    return ((s ^ (s >>> 16)) >>> 0) / 0xffffffff;
  };
}

/* ── 生成 9 個偽歷史數據點（末尾 = change_pct）── */
function generateSparkData(changePct, symbol, date) {
  const rng = seededRNG((symbol || '') + (date || ''));
  const end = changePct || 0;
  const pts = [];
  let cur = end * 0.3;
  for (let i = 0; i < 8; i++) {
    cur += (rng() - 0.48) * Math.abs(end || 0.5) * 0.6;
    pts.push(+cur.toFixed(3));
  }
  pts.push(+end.toFixed(3));
  return pts;
}

/* ── A区：情緒分數（優先用 CNN 真實數據）── */
function calcSentimentScore(data) {
  // 有 CNN 真實數據就直接用
  const fg = data.fear_greed;
  if (fg && fg.score !== null && fg.score !== undefined) {
    return Math.round(fg.score);
  }
  // fallback：由信號比例 + 風險燈號推算
  const signals = (data.watchlist || []).map(w => w.signal);
  const total   = signals.length || 1;
  const greens  = signals.filter(s => s === '🟢').length;
  const yellows = signals.filter(s => s === '🟡').length;
  let score = Math.round(((greens + yellows * 0.5) / total) * 100);
  if (data.risk_line) {
    if (data.risk_line.includes('紅')) score = Math.min(score, 28);
    else if (data.risk_line.includes('黃')) score = Math.min(score, 52);
  }
  const idxArr = data.indices || [];
  if (idxArr.length) {
    const avg = idxArr.reduce((s, i) => s + (i.change_pct || 0), 0) / idxArr.length;
    score = Math.min(100, Math.max(0, score + Math.round(avg * 3)));
  }
  return Math.max(0, Math.min(100, score));
}

/* ── ApexCharts 情緒半圓儀表 ── */
function initGauge(score, data) {
  const el = document.querySelector('#sentiment-gauge');
  if (!el || typeof ApexCharts === 'undefined') return;
  const color = score >= 65 ? '#10B981' : score >= 45 ? '#F59E0B' : '#EF4444';
  // CNN 有標籤用 CNN，否則推算
  const fg = (data || {}).fear_greed;
  const label = (fg && fg.label) ? fg.label
              : score >= 75 ? '極度貪婪'
              : score >= 60 ? '貪婪'
              : score >= 45 ? '中性'
              : score >= 30 ? '恐慌'
              : '極度恐慌';
  new ApexCharts(el, {
    series: [score],
    chart: { type: 'radialBar', height: 170, background: 'transparent', toolbar: { show: false } },
    plotOptions: {
      radialBar: {
        startAngle: -90, endAngle: 90,
        hollow: { size: '55%', background: 'transparent' },
        track: { background: '#2A354D', strokeWidth: '97%' },
        dataLabels: {
          name:  { show: true, color: '#94A3B8', fontSize: '11px', offsetY: 16, formatter: () => label },
          value: { color, fontSize: '26px', fontWeight: 700, fontFamily: 'JetBrains Mono', offsetY: -12,
                   formatter: v => v }
        }
      }
    },
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark', type: 'horizontal',
        colorStops: [
          [{ offset: 0, color: '#EF4444', opacity: 1 },
           { offset: 50, color: '#F59E0B', opacity: 1 },
           { offset: 100, color: '#10B981', opacity: 1 }]
        ]
      }
    },
    stroke: { lineCap: 'round' },
    labels: [label],
    theme: { mode: 'dark' }
  }).render();
}

/* ── ApexCharts Sparkline ── */
function initSparkline(elId, data, isUp) {
  const el = document.querySelector(`#${elId}`);
  if (!el || typeof ApexCharts === 'undefined') return;
  const color = isUp ? '#10B981' : '#EF4444';
  const glow  = isUp ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)';
  new ApexCharts(el, {
    series: [{ data }],
    chart: {
      type: 'area', height: 36, background: 'transparent',
      sparkline: { enabled: true },
      animations: { enabled: false },
      dropShadow: { enabled: true, top: 0, left: 0, blur: 4, color: glow, opacity: 0.6 }
    },
    stroke: { curve: 'smooth', width: 1.5, colors: [color] },
    fill: {
      type: 'gradient',
      gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 100] },
      colors: [color]
    },
    tooltip: { enabled: false },
    theme: { mode: 'dark' }
  }).render();
}

/* ── 渲染函數 ── */
function renderIndices(indices, date) {
  return indices.map((i, idx) => `
    <div class="index-card">
      <div class="name">${i.name}</div>
      <div class="price ${pctClass(i.change_pct)}">${fmtPrice(i.price)}</div>
      <div class="change ${pctClass(i.change_pct)}">${fmtPct(i.change_pct)}</div>
      <div class="index-spark" id="idx-spark-${idx}"></div>
    </div>
  `).join('');
}

function renderSignalBadge(sigArr, symbol) {
  if (!sigArr || !sigArr.length) return '';
  const sym = symbol.replace('-USD','').toUpperCase();
  const s = sigArr.find(s => s.symbol === sym);
  if (!s) return '';
  const cfg = {
    buy:   { cls: 'sig-buy',   label: 'BUY' },
    watch: { cls: 'sig-watch', label: 'WATCH' },
    sell:  { cls: 'sig-sell',  label: 'SELL' },
  };
  const c = cfg[s.signal_type];
  if (!c) return '';
  const title = s.note ? ` title="${s.note}"` : '';
  return `<span class="action-badge ${c.cls}"${title}>${c.label}</span>`;
}

function renderWatchlist(items, date, signals) {
  return items.map(w => {
    const symbol = w.symbol.replace('-USD', '');
    const desc   = w.name.includes('（') ? w.name.split('（')[1].replace('）','') : w.name;
    const safeId = 'spark-' + symbol.replace(/[^a-zA-Z0-9]/g, '_');
    const vr = w.volume_ratio;
    const volBadge = vr
      ? `<span class="vol-badge ${vr >= 1.5 ? 'vol-spike' : 'vol-normal'}">${vr.toFixed(1)}x</span>`
      : '';
    const actionBadge = renderSignalBadge(signals, w.symbol);
    return `
      <div class="watchlist-item">
        <div class="wi-left">
          ${signalDot(w.signal)}
          <div style="min-width:0">
            <div class="symbol">${symbol}${volBadge}${actionBadge}</div>
            <div class="desc">${desc}<span class="tag">${w.category}</span></div>
          </div>
        </div>
        <div class="wi-spark" id="${safeId}"></div>
        <div class="wi-right">
          <div class="price-val">${fmtPrice(w.price)}</div>
          <div class="pct ${pctClass(w.change_pct)}">${fmtPct(w.change_pct)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderSectorHeatmap(watchlist) {
  const sectors = [
    { name: '科技與AI',  icon: '💻', keys: ['SMH', 'AIQ', 'BOTZ'] },
    { name: '能源與核能', icon: '⚡', keys: ['URNM', 'NLR', 'CPER'] },
    { name: '避險資產',  icon: '🛡️', keys: ['GLD', 'BTC', 'ETH'] },
  ];
  const lookup = {};
  watchlist.forEach(w => { lookup[w.symbol.replace('-USD','')] = w; });

  return sectors.map(sector => {
    const items = sector.keys.map(k => lookup[k]).filter(Boolean);
    return `
      <div class="heatmap-sector">
        <div class="heatmap-sector-title">${sector.icon} ${sector.name}</div>
        <div class="heatmap-blocks">
          ${items.map(w => {
            const pct  = w.change_pct || 0;
            const abs  = Math.min(Math.abs(pct) / 4, 1);
            const bg   = pct >= 0
              ? `rgba(16,185,129,${(0.08 + abs * 0.45).toFixed(2)})`
              : `rgba(239,68,68,${(0.08 + abs * 0.45).toFixed(2)})`;
            const border = pct >= 0
              ? `rgba(16,185,129,${(0.25 + abs * 0.5).toFixed(2)})`
              : `rgba(239,68,68,${(0.25 + abs * 0.5).toFixed(2)})`;
            const sym = w.symbol.replace('-USD','');
            return `
              <div class="heatmap-block" style="background:${bg};border-color:${border}">
                <div class="hb-symbol">${sym}</div>
                <div class="hb-pct ${pctClass(pct)}">${fmtPct(pct)}</div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

/* ── 宏觀指標列 ── */
function renderMacroStrip(macro) {
  if (!macro || !macro.length) return '';

  // DXY > 105 強勢；US10Y > 4.5% 高壓；VIX > 20 恐慌
  const hints = {
    'DXY':   v => v > 105 ? '強美元' : v < 100 ? '弱美元' : '中性',
    'US10Y': v => v > 4.5 ? '高壓估值' : v < 3.5 ? '寬鬆' : '中性',
    'VIX':   v => v > 25 ? '🔴恐慌' : v > 20 ? '🟡警戒' : '🟢平靜',
  };

  const items = macro.map(m => {
    const val  = m.price !== null ? m.price.toFixed(2) : 'N/A';
    const hint = hints[m.name] ? hints[m.name](m.price || 0) : '';
    return `
      <div class="macro-item" title="${m.desc || m.name}">
        <span class="m-name">${m.name}</span>
        <span class="m-val">${val}</span>
        <span class="m-chg ${pctClass(m.change_pct)}">${fmtPct(m.change_pct)}</span>
        ${hint ? `<span class="m-desc">${hint}</span>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="macro-strip section-gap">
      <span class="macro-label">宏觀</span>
      ${items}
    </div>
  `;
}

function renderText(text) {
  if (!text || text.includes('失敗')) return '<span style="color:var(--text-muted)">（暫無資料）</span>';
  return `<div class="text-block">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
}

/* ── 解析 risk_line 取得數字評分 ── */
function parseRiskScore(riskLine) {
  if (!riskLine) return null;
  const m = riskLine.match(/score=(\d+)/i);
  return m ? parseInt(m[1]) : null;
}

/* ── 整體風險面板（含評分說明）── */
function renderRiskPanel(data) {
  const signals = data.watchlist || [];
  const greens  = signals.filter(w => w.signal === '🟢').length;
  const yellows = signals.filter(w => w.signal === '🟡').length;
  const reds    = signals.filter(w => w.signal === '🔴').length;
  const score   = parseRiskScore(data.risk_line);
  const scoreStr = score !== null ? `${score}/10` : '—';

  return `
    <div class="risk-panel">
      <div class="risk-top">
        <span class="risk-label">整體風險評分</span>
        ${riskBadge(data.risk_line)}
        <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)">
          ${scoreStr}
        </span>
        <span class="date">${data.date}</span>
      </div>
      <div class="risk-bottom">
        <div class="risk-signals">
          <span class="sig-count green"><span class="signal green" style="margin:0"></span>${greens}</span>
          <span class="sig-count yellow"><span class="signal yellow" style="margin:0"></span>${yellows}</span>
          <span class="sig-count red"><span class="signal red" style="margin:0"></span>${reds}</span>
        </div>
        <div class="risk-explain">
          <strong>評分說明</strong>：綜合掃描 SPX/NQ 趨勢、VIX 波動率、WTI 油價、
          各板塊信號強弱、多空資金分歧，每項最高 2 分，滿分 8 分。
          分數越高代表當前市場承壓越大、尾部風險越集中。
          <div class="risk-thresholds">
            <span class="risk-thr green">🟢 0–3　市場健康，可積極持倉</span>
            <span class="risk-thr yellow">🟡 4–5　注意波動，控管部位規模</span>
            <span class="risk-thr red">🔴 6–8　高風險，建議降低整體曝險</span>
          </div>
        </div>
      </div>
      ${(data.risk_factors && data.risk_factors.length > 0) ? `
      <div class="risk-factors-section">
        <div class="risk-factors-title">風險因子明細（J段掃描）</div>
        <table class="risk-factors-table">
          <thead><tr><th>段落</th><th>本輪狀況</th><th>分數</th></tr></thead>
          <tbody>
            ${data.risk_factors.map(f => {
              const scoreNum = parseInt((f.score || '').replace(/\D/g,'')) || 0;
              const rowClass = scoreNum >= 2 ? 'row-red' : scoreNum >= 1 ? 'row-yellow' : 'row-green';
              return `<tr class="${rowClass}"><td>${f.segment}</td><td>${f.status || f.indicator || ''}</td><td>${f.score}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>
  `;
}

/* ── 今日總結卡片 ── */
function renderDailySummary(data) {
  const watchlist = data.watchlist || [];
  const indices   = data.indices   || [];

  // 市場偏向
  const avgIdx = indices.length
    ? indices.reduce((s, i) => s + (i.change_pct || 0), 0) / indices.length
    : 0;
  const biasLabel = avgIdx >= 0.8 ? '多頭偏強' : avgIdx >= 0.2 ? '小幅收漲'
                  : avgIdx >= -0.2 ? '震盪整理'  : avgIdx >= -0.8 ? '小幅收跌' : '空頭偏弱';
  const biasClass = avgIdx >= 0.2 ? 'up' : avgIdx <= -0.2 ? 'down' : 'flat';

  // 最強 / 最弱標的
  const sorted = [...watchlist].filter(w => w.change_pct !== null)
    .sort((a, b) => (b.change_pct || 0) - (a.change_pct || 0));
  const best  = sorted[0];
  const worst = sorted[sorted.length - 1];

  // 信號分布
  const greens  = watchlist.filter(w => w.signal === '🟢').length;
  const reds    = watchlist.filter(w => w.signal === '🔴').length;
  const sigText = greens > reds ? `${greens} 強 / ${reds} 弱` : `${reds} 弱 / ${greens} 強`;

  // AI 操作方向（取 📌 整體策略 那行）
  const advice = data.advice || '';
  const strategyLine = advice.split('\n').find(l => l.includes('📌')) || '';
  const strategyText = strategyLine.replace('📌', '').replace('整體策略：', '').trim()
    || advice.split('\n').find(l => l.trim().length > 10) || '（暫無建議）';

  const bestSym  = best  ? best.symbol.replace('-USD','')  : '—';
  const worstSym = worst ? worst.symbol.replace('-USD','') : '—';

  return `
    <div class="summary-card section-gap">
      <h2>今日總結</h2>
      <div class="summary-stats">
        <div class="stat-block">
          <div class="stat-label">市場偏向</div>
          <div class="stat-value ${biasClass}">${biasLabel}</div>
          <div class="stat-sub">指數均漲跌 ${avgIdx >= 0 ? '+' : ''}${avgIdx.toFixed(2)}%</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最強標的</div>
          <div class="stat-value up">${bestSym}</div>
          <div class="stat-sub">${best ? fmtPct(best.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">最弱標的</div>
          <div class="stat-value down">${worstSym}</div>
          <div class="stat-sub">${worst ? fmtPct(worst.change_pct) : '—'}</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">信號分布</div>
          <div class="stat-value ${greens > reds ? 'up' : reds > greens ? 'down' : 'flat'}">${sigText}</div>
          <div class="stat-sub">共 ${watchlist.length} 個追蹤標的</div>
        </div>
      </div>
      <div class="summary-advice">
        <div class="advice-label">📌 操作方向</div>
        ${strategyText.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </div>
      ${data.prev_review ? `
      <div class="summary-advice" style="margin-top:10px;border-left-color:var(--text-muted)">
        <div class="advice-label" style="color:var(--text-muted)">🔍 前日建議檢討</div>
        ${data.prev_review.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
      </div>` : ''}
    </div>
  `;
}

/* ── 圖表初始化（DOM ready 後呼叫）── */
function initCharts(data, history = {}) {
  const date = data.date || '';

  // A区：情緒儀表（CNN 真實數據）
  initGauge(calcSentimentScore(data), data);
  // 來源標注
  const fgEl = document.getElementById('gauge-source');
  if (fgEl) {
    const fg = data.fear_greed;
    if (fg && fg.score !== null) {
      const wk = fg.week_change;
      const wkStr = wk !== null && wk !== undefined
        ? ` / 近一週 ${wk >= 0 ? '+' : ''}${wk.toFixed(1)}`
        : '';
      fgEl.textContent = `CNN Fear & Greed${wkStr}`;
    } else {
      fgEl.textContent = '信號推算（CNN 暫不可用）';
    }
  }

  // 指數 sparklines
  (data.indices || []).forEach((idx, i) => {
    const key  = idx.symbol.replace('-USD', '');
    const hist = history[key] || [];
    const pts  = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(idx.change_pct, idx.name, date);
    const isUp = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (idx.change_pct || 0) >= 0;
    initSparkline(`idx-spark-${i}`, pts, isUp);
  });

  // B区：watchlist sparklines
  (data.watchlist || []).forEach(w => {
    const sym    = w.symbol.replace('-USD', '');
    const safeId = 'spark-' + sym.replace(/[^a-zA-Z0-9]/g, '_');
    const hist   = history[sym] || [];
    const pts    = hist.length >= 5
      ? hist.slice(-30).map(h => h.price)
      : generateSparkData(w.change_pct, sym, date);
    const isUp   = pts.length >= 2 ? pts[pts.length-1] >= pts[0] : (w.change_pct || 0) >= 0;
    initSparkline(safeId, pts, isUp);
  });
}

function render(data, history = {}) {
  document.getElementById('report-meta').textContent =
    `${data.date}  ·  更新 ${data.generated_at}`;
  updateMarketStatus();

  const app = document.getElementById('app');
  app.innerHTML = `

    <!-- 風險面板 -->
    ${renderRiskPanel(data)}

    <!-- 今日總結 -->
    ${renderDailySummary(data)}

    <!-- 宏觀指標列 -->
    ${renderMacroStrip(data.macro || [])}

    <!-- A区：情緒儀表 + AI 總結 -->
    <div class="grid-gauge section-gap">
      <div class="gauge-card">
        <h2>市場情緒</h2>
        <div id="sentiment-gauge"></div>
        <div class="gauge-legend"><span>恐慌</span><span>貪婪</span></div>
        <div id="gauge-source" style="font-size:10px;color:var(--text-muted);margin-top:4px;text-align:center"></div>
      </div>
      <div class="ai-hero" style="margin-bottom:0">
        <div class="ai-hero-label">
          <span class="ai-dot"></span>
          AI 盤後總結
        </div>
        <div class="ai-summary-text">${(data.advice || '（暫無分析）').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
    </div>

    <!-- 三大指數（含 sparklines）-->
    <div class="grid-3 section-gap">
      ${renderIndices(data.indices || [], data.date)}
    </div>

    <!-- C区：板塊熱力圖 -->
    <div class="section-gap">
      <div class="section-title" style="padding:0 2px;margin-bottom:10px">板塊熱力圖</div>
      <div class="heatmap-wrap">
        ${renderSectorHeatmap(data.watchlist || [])}
      </div>
    </div>

    <!-- D区：30天走勢對比 -->
    <div class="trend-card section-gap">
      <h2>30 日走勢對比（相對起點 %）</h2>
      <div id="trend-chart"></div>
    </div>

    <!-- B区：標的明細（含 sparklines）+ 重大事件 -->
    <div class="grid-2 section-gap">
      <div class="card">
        <h2>追蹤標的明細</h2>
        ${renderWatchlist(data.watchlist || [], data.date, data.signals || [])}
      </div>
      <div class="card">
        <h2>今日重大事件</h2>
        ${renderText(data.events)}
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-bar">
      <h3>🔔 每日自動推送到你的 Telegram</h3>
      <p>每個交易日 05:00 自動收到完整盤後報告，包含 AI 分析與操作建議</p>
      <a href="https://t.me/your_channel" class="btn-primary">免費訂閱頻道</a>
    </div>
  `;

  // DOM 就緒後初始化所有圖表
  requestAnimationFrame(() => {
    initCharts(data, history);
    initTrendChart(history);
  });
}

async function main() {
  try {
    const latest = await fetchJSON('reports/latest.json');

    // 初始化日期列表
    allDates   = latest.all_dates || [latest.latest_date];
    currentIdx = allDates.length - 1;

    const data = await fetchJSON(`reports/${allDates[currentIdx]}.json`);

    // 並行抓取所有 symbol 的歷史數據
    const allSymbols = [
      ...(data.indices   || []).map(i => i.symbol),
      ...(data.watchlist || []).map(w => w.symbol),
    ];
    await Promise.allSettled(
      [...new Set(allSymbols)].map(async sym => {
        const key = sym.replace('-USD', '');
        try {
          cachedHistory[key] = await fetchJSON(`reports/history/${key}.json`);
        } catch { cachedHistory[key] = []; }
      })
    );

    renderDateNavUI();
    render(data, cachedHistory);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">❌ 載入失敗：${e.message}<br><small>請稍後再試</small></div>`;
  }
}

main();
</script>
