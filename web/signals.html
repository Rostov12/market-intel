<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intel — Signal Hub</title>
<link rel="stylesheet" href="shared.css">
<style>
:root {
  --bg: #0f1117; --card: #1a1d29; --border: #2a2d3a;
  --text: #e0e0e0; --muted: #888; --accent: #4f9cf7;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316;
  --purple: #a855f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
h1 { font-size: 1.4em; margin-bottom: 8px; }
h2 { font-size: 1.1em; color: var(--accent); margin: 16px 0 8px; }
.subtitle { color: var(--muted); font-size: 0.85em; margin-bottom: 16px; }
.grid { display: grid; gap: 12px; }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title { font-weight: 600; }
.badge { font-size: 0.75em; padding: 2px 8px; border-radius: 10px; }
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }

/* DeepEar Signal Cards */
.signal-item { padding: 12px; border-bottom: 1px solid var(--border); }
.signal-item:last-child { border-bottom: none; }
.signal-title { font-weight: 600; margin-bottom: 4px; }
.signal-meta { display: flex; gap: 12px; font-size: 0.8em; color: var(--muted); margin-bottom: 6px; }
.signal-summary { font-size: 0.9em; line-height: 1.5; color: #bbb; }
.confidence-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 8px; }
.confidence-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* Tracker */
.tracker-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.tracker-row:last-child { border-bottom: none; }
.tracker-ticker { font-weight: 700; min-width: 60px; font-family: monospace; }
.tracker-name { flex: 1; color: var(--muted); font-size: 0.9em; }
.tracker-conf { min-width: 60px; text-align: right; }
.conf-high { color: var(--green); }
.conf-mid { color: var(--yellow); }
.conf-low { color: var(--red); }
.evolution-tag { font-size: 0.75em; padding: 1px 6px; border-radius: 4px; }

/* Transmission Chain */
.chain { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.chain-node { padding: 6px 12px; border-radius: 6px; font-size: 0.85em; border: 1px solid var(--border); }
.chain-arrow { color: var(--muted); }
.chain-bullish { border-color: var(--green); background: rgba(34,197,94,0.1); }
.chain-bearish { border-color: var(--red); background: rgba(239,68,68,0.1); }

/* Stats */
.stats-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; min-width: 120px; text-align: center; }
.stat-value { font-size: 1.5em; font-weight: 700; }
.stat-label { font-size: 0.75em; color: var(--muted); margin-top: 2px; }

/* Risk */
.risk-meter { height: 12px; border-radius: 6px; background: linear-gradient(to right, var(--green), var(--yellow), var(--orange), var(--red)); position: relative; margin: 12px 0; }
.risk-marker { position: absolute; top: -4px; width: 4px; height: 20px; background: white; border-radius: 2px; }

.nav-link { color: var(--accent); text-decoration: none; font-size: 0.85em; }
.nav-link:hover { text-decoration: underline; }
#loading { text-align: center; color: var(--muted); padding: 40px; }
.error { color: var(--red); text-align: center; padding: 20px; }
</style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
  <h1>Signal Hub</h1>
  <a href="index.html" class="nav-link">< Dashboard</a>
</div>
<div class="subtitle">DeepEar AI Signals + Signal Tracker | <span id="updated"></span></div>

<div class="stats-row" id="stats"></div>

<div class="grid grid-2">
  <!-- DeepEar Signals -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">DeepEar AI Signals</span>
      <span class="badge badge-purple">External</span>
    </div>
    <div id="deepear-list"><div id="loading">Loading...</div></div>
  </div>

  <!-- Signal Tracker -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Watchlist Signal Tracker</span>
      <span class="badge badge-green">Internal</span>
    </div>
    <div id="tracker-list"><div id="loading">Loading...</div></div>
  </div>
</div>

<!-- Risk Assessment -->
<h2>Risk Assessment</h2>
<div class="card" id="risk-card" style="display:none;">
  <div class="card-header">
    <span class="card-title" id="risk-level"></span>
    <span id="risk-score"></span>
  </div>
  <div class="risk-meter"><div class="risk-marker" id="risk-marker"></div></div>
  <div id="risk-factors" style="font-size:0.9em; color:var(--muted);"></div>
</div>

<!-- Transmission Chains (from DeepEar) -->
<h2>Signal Transmission Chains</h2>
<div class="card" id="chains-card">
  <div id="chains-list"><div id="loading">Loading...</div></div>
</div>

<script src="shared.js"></script>
<script>
async function loadJSON(file) {
  try {
    const r = await fetch(file + '?t=' + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function confColor(c) {
  if (c >= 0.7) return 'conf-high';
  if (c >= 0.4) return 'conf-mid';
  return 'conf-low';
}

function confBarColor(c) {
  if (c >= 0.8) return 'var(--green)';
  if (c >= 0.6) return 'var(--accent)';
  if (c >= 0.4) return 'var(--yellow)';
  return 'var(--red)';
}

function renderDeepEar(data) {
  const el = document.getElementById('deepear-list');
  if (!data || !data.signals || !data.signals.length) {
    el.innerHTML = '<div class="error">No signals available</div>';
    return;
  }
  el.innerHTML = data.signals.map(s => `
    <div class="signal-item">
      <div class="signal-title">${s.title || 'Untitled'}</div>
      <div class="signal-meta">
        <span>Confidence: ${(s.confidence*100).toFixed(0)}%</span>
        <span>Intensity: ${'&#9889;'.repeat(Math.min(s.intensity||0, 5))}</span>
        <span>Timeliness: ${((s.timeliness||0)*100).toFixed(0)}%</span>
      </div>
      <div class="signal-summary">${(s.summary||'').substring(0, 200)}${(s.summary||'').length > 200 ? '...' : ''}</div>
      <div class="confidence-bar">
        <div class="confidence-fill" style="width:${(s.confidence||0)*100}%;background:${confBarColor(s.confidence||0)}"></div>
      </div>
    </div>
  `).join('');

  document.getElementById('updated').textContent = 'DeepEar: ' + (data.fetched_at || '').substring(0, 16);
}

function renderTracker(data) {
  const el = document.getElementById('tracker-list');
  if (!data || !data.signals || !data.signals.length) {
    el.innerHTML = '<div class="error">No tracked signals</div>';
    return;
  }

  const sorted = [...data.signals].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
  el.innerHTML = sorted.map(s => {
    const lastEvo = (s.evolution_history || []).slice(-1)[0];
    let evoTag = '';
    if (lastEvo) {
      const colors = { strengthened: 'badge-green', weakened: 'badge-yellow', falsified: 'badge-red' };
      const icons = { strengthened: '&#x1F7E2;', weakened: '&#x1F7E1;', falsified: '&#x1F534;' };
      evoTag = `<span class="evolution-tag ${colors[lastEvo.evolution] || ''}">${icons[lastEvo.evolution] || ''} ${lastEvo.evolution}</span>`;
    }
    return `
      <div class="tracker-row">
        <span class="tracker-ticker">${s.ticker}</span>
        <span class="tracker-name">${s.name || ''} ${evoTag}</span>
        <span class="tracker-conf ${confColor(s.confidence || 0)}">${((s.confidence||0)*100).toFixed(0)}%</span>
      </div>
    `;
  }).join('');
}

function renderChains(data) {
  const el = document.getElementById('chains-list');
  if (!data || !data.signals) { el.innerHTML = '<div class="error">No chains</div>'; return; }

  const withChains = data.signals.filter(s => s.transmission_chain && s.transmission_chain.length > 0);
  if (!withChains.length) { el.innerHTML = '<div style="color:var(--muted);padding:12px;">No transmission chains available</div>'; return; }

  el.innerHTML = withChains.slice(0, 4).map(s => {
    const chain = s.transmission_chain.map(n => {
      const cls = (n.impact_type || '').includes('利好') ? 'chain-bullish' : 'chain-bearish';
      return `<span class="chain-node ${cls}" title="${n.logic || ''}">${n.node_name}</span>`;
    }).join('<span class="chain-arrow">&#x2192;</span>');
    return `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-weight:600;margin-bottom:6px;">${s.title}</div>
        <div class="chain">${chain}</div>
      </div>
    `;
  }).join('');
}

function renderStats(deepear, tracker) {
  const el = document.getElementById('stats');
  const sigCount = deepear?.signal_count || 0;
  const trackCount = tracker?.signals?.length || 0;
  const avgConf = deepear?.signals?.length
    ? (deepear.signals.reduce((a, s) => a + (s.confidence || 0), 0) / deepear.signals.length * 100).toFixed(0)
    : '-';
  const changed = tracker?.signals?.filter(s => {
    const h = s.evolution_history || [];
    const today = new Date().toISOString().slice(0, 10);
    return h.length && h[h.length - 1].date === today;
  }).length || 0;

  el.innerHTML = `
    <div class="stat-box"><div class="stat-value" style="color:var(--purple)">${sigCount}</div><div class="stat-label">DeepEar Signals</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--accent)">${trackCount}</div><div class="stat-label">Tracked Items</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--yellow)">${avgConf}%</div><div class="stat-label">Avg Confidence</div></div>
    <div class="stat-box"><div class="stat-value" style="color:var(--orange)">${changed}</div><div class="stat-label">Changed Today</div></div>
  `;
}

async function init() {
  const [deepear, tracker] = await Promise.all([
    loadJSON('deepear-signals.json'),
    loadJSON('signal-tracker.json'),
  ]);

  renderDeepEar(deepear);
  renderTracker(tracker);
  renderChains(deepear);
  renderStats(deepear, tracker);

  // Risk (from skills output if available, otherwise estimate)
  const riskCard = document.getElementById('risk-card');
  if (tracker && tracker.signals) {
    const avgConf = tracker.signals.reduce((a, s) => a + (s.confidence || 0.5), 0) / tracker.signals.length;
    const riskScore = Math.max(0, Math.min(100, Math.round((1 - avgConf) * 100)));
    const level = riskScore >= 70 ? 'High Risk' : riskScore >= 50 ? 'Moderate Risk' : riskScore >= 30 ? 'Low Risk' : 'Very Low Risk';
    const levelColor = riskScore >= 70 ? 'var(--red)' : riskScore >= 50 ? 'var(--yellow)' : 'var(--green)';

    document.getElementById('risk-level').textContent = level;
    document.getElementById('risk-level').style.color = levelColor;
    document.getElementById('risk-score').textContent = riskScore + '/100';
    document.getElementById('risk-marker').style.left = riskScore + '%';
    riskCard.style.display = 'block';
  }
}

renderNav();
init();
</script>
</body>
</html>
